<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoboRave Korea Open – Competition Dashboard</title>
<style>
/* ── RESET & VARIABLES ────────────────────────────────── */
:root {
  --navy:   #1a3a6b;
  --navy2:  #2456a4;
  --red:    #e63946;
  --gold:   #f4c430;
  --green:  #06c87e;
  --orange: #f4874b;
  --bg:     #eef2f7;
  --white:  #ffffff;
  --g100:   #f8f9fa;
  --g200:   #e9ecef;
  --g300:   #dee2e6;
  --g400:   #ced4da;
  --g500:   #adb5bd;
  --g600:   #6c757d;
  --g800:   #343a40;
  --text:   #1e293b;
  --sh1: 0 1px 4px rgba(0,0,0,.10);
  --sh2: 0 4px 14px rgba(0,0,0,.13);
  --sh3: 0 8px 28px rgba(0,0,0,.18);
  --r:  8px;
  --rl: 14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
button{cursor:pointer;border:none;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:inherit}

/* ── HEADER ───────────────────────────────────────────── */
.hdr{
  background:linear-gradient(135deg,#0f2548 0%,var(--navy2) 100%);
  color:#fff;padding:.75rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--sh2);position:sticky;top:0;z-index:200;gap:1rem
}
.hdr-brand{display:flex;align-items:center;gap:.75rem}
.hdr-logo{font-size:2rem;line-height:1}
.hdr-txt .title{font-size:1.05rem;font-weight:800;letter-spacing:.01em}
.hdr-txt .sub{font-size:.72rem;opacity:.75;margin-top:.1rem}
.hdr-actions{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.badge-admin{
  background:var(--gold);color:#1a2a00;
  padding:.25rem .7rem;border-radius:20px;
  font-size:.75rem;font-weight:800;white-space:nowrap
}
.btn-hdr{
  background:rgba(255,255,255,.14);color:#fff;
  border:1px solid rgba(255,255,255,.28);
  padding:.38rem .9rem;border-radius:6px;
  font-size:.8rem;font-weight:600;transition:background .2s
}
.btn-hdr:hover{background:rgba(255,255,255,.24)}
.btn-hdr.danger{background:rgba(220,50,50,.3);border-color:rgba(220,50,50,.5)}
.btn-hdr.danger:hover{background:rgba(220,50,50,.5)}

/* ── NAV ──────────────────────────────────────────────── */
.main-nav{
  background:#fff;border-bottom:2px solid var(--g200);
  display:flex;padding:0 1.25rem;gap:0;overflow-x:auto;
  box-shadow:var(--sh1)
}
.nav-btn{
  padding:.85rem 1.2rem;font-size:.875rem;font-weight:700;
  color:var(--g600);border-bottom:3px solid transparent;
  background:none;white-space:nowrap;transition:all .2s;
  display:flex;align-items:center;gap:.4rem
}
.nav-btn:hover{color:var(--navy)}
.nav-btn.active{color:var(--navy);border-bottom-color:var(--navy)}

/* ── MAIN ─────────────────────────────────────────────── */
.main{padding:1.25rem;max-width:1440px;margin:0 auto}

/* ── CARDS ────────────────────────────────────────────── */
.card{background:#fff;border-radius:var(--rl);box-shadow:var(--sh1);overflow:hidden}
.card-hdr{
  padding:.85rem 1.15rem;border-bottom:1px solid var(--g200);
  display:flex;align-items:center;justify-content:space-between;gap:.75rem
}
.card-title{font-size:.95rem;font-weight:800;display:flex;align-items:center;gap:.4rem}
.card-body{padding:1.15rem}

/* ── BUTTONS ──────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:.35rem;
  padding:.45rem .9rem;border-radius:6px;font-size:.82rem;font-weight:700;
  transition:all .2s;cursor:pointer
}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy2)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{filter:brightness(.9)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{filter:brightness(.9)}
.btn-outline{background:#fff;color:var(--navy);border:1.5px solid var(--navy)}
.btn-outline:hover{background:var(--g100)}
.btn-ghost{background:var(--g100);color:var(--g800);border:1px solid var(--g300)}
.btn-ghost:hover{background:var(--g200)}
.btn-sm{padding:.3rem .65rem;font-size:.76rem}
.btn-xs{padding:.18rem .5rem;font-size:.7rem;border-radius:5px}

/* ── TABS ─────────────────────────────────────────────── */
.tab-bar{display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap}
.tab-btn{
  padding:.45rem 1rem;border-radius:7px;font-size:.82rem;font-weight:700;
  background:#fff;color:var(--g600);border:1.5px solid var(--g300);
  transition:all .2s;text-align:center;line-height:1.35
}
.tab-btn:hover{border-color:var(--navy);color:var(--navy)}
.tab-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.tab-btn small{font-weight:400;opacity:.85}

/* ── TABLES ───────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.84rem}
thead th{
  background:var(--g100);padding:.55rem .75rem;text-align:left;
  font-weight:800;color:var(--g800);border-bottom:2px solid var(--g200);
  white-space:nowrap
}
tbody td{padding:.5rem .75rem;border-bottom:1px solid var(--g200);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--g100)}
.tr-1st{background:#fff9e6!important}
.tr-2nd{background:#eef4ff!important}
.tr-3rd{background:#edfff6!important}

/* ── BADGES ───────────────────────────────────────────── */
.badge{
  display:inline-flex;align-items:center;gap:.2rem;
  padding:.18rem .55rem;border-radius:20px;font-size:.7rem;font-weight:800;white-space:nowrap
}
.badge-done{background:#d1fae5;color:#065f46}
.badge-ongoing{background:#fef3c7;color:#92400e;animation:pulse 1.5s infinite}
.badge-pending{background:var(--g200);color:var(--g600)}
.badge-adv{background:#fef3c7;color:#92400e;font-size:.65rem}
.badge-champion{background:linear-gradient(135deg,#f4c430,#e8a800);color:#1a2a00}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ── STATS ────────────────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.85rem;margin-bottom:1.25rem}
.stat-card{
  background:#fff;border-radius:var(--r);padding:1rem 1.1rem;
  box-shadow:var(--sh1);border-left:4px solid var(--navy)
}
.stat-card.green{border-left-color:var(--green)}
.stat-card.orange{border-left-color:var(--orange)}
.stat-card.red{border-left-color:var(--red)}
.stat-lbl{font-size:.7rem;font-weight:800;color:var(--g600);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem}
.stat-val{font-size:2rem;font-weight:900;color:var(--text);line-height:1}
.stat-sub{font-size:.72rem;color:var(--g500);margin-top:.2rem}

/* ── ARENA GRID ───────────────────────────────────────── */
.arena-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
.arena-card{
  border:2px solid var(--g300);border-radius:var(--r);
  padding:.75rem;text-align:center;transition:all .2s;background:#fff
}
.arena-card.active{border-color:var(--orange);background:#fff8f2}
.arena-card.done{border-color:var(--green);background:#f0fff8}
.arena-card.lf{border-color:#a78bfa;background:#faf5ff}
.arena-num{font-size:.68rem;font-weight:800;color:var(--g500);text-transform:uppercase;letter-spacing:.08em}
.arena-teams{font-size:.82rem;font-weight:700;margin-top:.25rem;line-height:1.4}
.arena-cat{font-size:.68rem;color:var(--g600);margin-top:.15rem;font-style:italic}

/* ── MATCH ITEM ───────────────────────────────────────── */
.match-list{display:flex;flex-direction:column;gap:.35rem}
.match-item{
  display:flex;align-items:center;gap:.5rem;
  padding:.55rem .75rem;border:1.5px solid var(--g200);
  border-radius:7px;transition:all .2s;background:#fff
}
.match-item.clickable{cursor:pointer}
.match-item.clickable:hover{border-color:var(--navy);background:var(--g100);transform:translateY(-1px);box-shadow:var(--sh1)}
.match-item.done{border-color:#b7f5d8;background:#f0fff8}
.match-item.ongoing{border-color:#fde68a;background:#fffbeb}
.match-teams{flex:1;display:flex;align-items:center;gap:.45rem;font-size:.84rem;flex-wrap:wrap}
.match-team{font-weight:700}
.match-vs{color:var(--g400);font-size:.75rem}
.match-result{font-size:.78rem;font-weight:800}
.match-arena-lbl{font-size:.7rem;color:var(--g500);white-space:nowrap}
.win{color:var(--green)}
.lose{color:var(--red)}
.draw-c{color:#ca8a04}

/* ── GROUP LABEL ──────────────────────────────────────── */
.gl-A{color:#1d4ed8}.gl-B{color:#dc2626}.gl-C{color:#16a34a}.gl-D{color:#9333ea}
.gl-E{color:#ea580c}.gl-F{color:#0891b2}.gl-G{color:#ca8a04}.gl-H{color:#db2777}

/* ── BRACKET ──────────────────────────────────────────── */
.bracket-section{margin-top:1.25rem;padding-top:1.25rem;border-top:2px dashed var(--g200)}
.bracket-stage-title{font-size:.9rem;font-weight:800;color:var(--navy);margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem}

/* ── PROGRESS BAR ─────────────────────────────────────── */
.prog-bar{background:var(--g200);border-radius:4px;height:7px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:4px;transition:width .4s}

/* ── SECTION HEADER ───────────────────────────────────── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;gap:.75rem;flex-wrap:wrap}
.sec-title{font-size:1.25rem;font-weight:900;color:var(--navy)}

/* ── VIEWS ────────────────────────────────────────────── */
.view{display:none}
.view.active{display:block}

/* ── GRID HELPERS ─────────────────────────────────────── */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.gauto{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1rem}

/* ── MODALS ───────────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:1rem
}
.overlay.hidden{display:none}
.modal{
  background:#fff;border-radius:var(--rl);width:100%;max-width:460px;
  box-shadow:var(--sh3);overflow:hidden;max-height:90vh;display:flex;flex-direction:column
}
.modal.wide{max-width:640px}
.modal-hdr{
  padding:.9rem 1.2rem;background:var(--navy);color:#fff;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0
}
.modal-hdr h3{font-size:.95rem;font-weight:800}
.modal-close{background:none;color:#fff;font-size:1.2rem;padding:.1rem .3rem;border-radius:4px;line-height:1;transition:background .2s}
.modal-close:hover{background:rgba(255,255,255,.2)}
.modal-body{padding:1.2rem;overflow-y:auto;flex:1}
.modal-foot{padding:.85rem 1.2rem;border-top:1px solid var(--g200);display:flex;gap:.5rem;justify-content:flex-end;flex-shrink:0}

/* ── FORM ─────────────────────────────────────────────── */
.fg{margin-bottom:.9rem}
.fg:last-child{margin-bottom:0}
.fl{display:block;font-size:.8rem;font-weight:700;color:var(--g800);margin-bottom:.35rem}
.fc{
  width:100%;padding:.45rem .75rem;
  border:1.5px solid var(--g400);border-radius:6px;
  font-size:.85rem;transition:border-color .2s;background:#fff
}
.fc:focus{outline:none;border-color:var(--navy)}
.frow{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}

/* ── RESULT BUTTONS ───────────────────────────────────── */
.res-btns{display:flex;gap:.5rem}
.res-btn{
  flex:1;padding:.6rem .4rem;border-radius:7px;font-size:.8rem;font-weight:800;
  border:2px solid var(--g300);background:#fff;color:var(--g600);transition:all .2s
}
.res-btn.sel-a{border-color:var(--navy);background:var(--navy);color:#fff}
.res-btn.sel-d{border-color:var(--gold);background:var(--gold);color:#1a2a00}
.res-btn.sel-b{border-color:var(--red);background:var(--red);color:#fff}
.match-preview{
  background:var(--g100);border-radius:8px;padding:.65rem;
  text-align:center;font-size:.9rem;font-weight:700;margin-bottom:.75rem;
  display:flex;align-items:center;justify-content:center;gap:.5rem;flex-wrap:wrap
}
.match-preview .versus{color:var(--g400);font-size:.8rem;font-weight:400}

/* ── INLINE EDIT ──────────────────────────────────────── */
.editable{cursor:pointer;border-bottom:1px dashed var(--g400);transition:color .2s}
.editable:hover{color:var(--navy)}

/* ── MISC ─────────────────────────────────────────────── */
.mt1{margin-top:.5rem}.mt2{margin-top:1rem}.mt3{margin-top:1.5rem}
.mb1{margin-bottom:.5rem}.mb2{margin-bottom:1rem}
.flex{display:flex}.ai-c{align-items:center}.jc-sb{justify-content:space-between}
.gap1{gap:.5rem}.gap2{gap:1rem}.fw{flex-wrap:wrap}
.fw7{font-weight:700}.fw9{font-weight:900}
.tc{text-align:center}
.muted{color:var(--g500)}
.small{font-size:.75rem}
.divider{height:1px;background:var(--g200);margin:1.1rem 0}
.info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:7px;padding:.75rem 1rem;font-size:.82rem;color:#1e40af;margin-bottom:1rem}
.warn-box{background:#fffbeb;border:1px solid #fde68a;border-radius:7px;padding:.75rem 1rem;font-size:.82rem;color:#92400e;margin-bottom:1rem}

/* ── RESPONSIVE ───────────────────────────────────────── */
@media(max-width:768px){
  .main{padding:.85rem}
  .g2,.g3{grid-template-columns:1fr}
  .arena-grid{grid-template-columns:repeat(2,1fr)}
  .frow{grid-template-columns:1fr 1fr}
  .hdr-txt .title{font-size:.9rem}
}
@media(max-width:480px){
  .arena-grid{grid-template-columns:1fr 1fr}
  .frow{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .tab-btn{font-size:.75rem;padding:.4rem .7rem}
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     MODALS
════════════════════════════════════════════════════════ -->

<!-- Login -->
<div class="overlay hidden" id="loginOverlay">
  <div class="modal">
    <div class="modal-hdr">
      <h3>🔐 관리자 로그인</h3>
      <button class="modal-close" onclick="closeModal('loginOverlay')">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label class="fl">관리자 비밀번호</label>
        <input type="password" class="fc" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <p id="loginErr" style="color:var(--red);font-size:.82rem;display:none">❌ 비밀번호가 올바르지 않습니다.</p>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('loginOverlay')">취소</button>
      <button class="btn btn-primary" onclick="doLogin()">로그인</button>
    </div>
  </div>
</div>

<!-- Match Result -->
<div class="overlay hidden" id="matchOverlay">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="matchModalTitle">⚔️ 경기 결과 입력</h3>
      <button class="modal-close" onclick="closeModal('matchOverlay')">✕</button>
    </div>
    <div class="modal-body">
      <div class="match-preview">
        <span id="mTeamA">팀A</span>
        <span class="versus">VS</span>
        <span id="mTeamB">팀B</span>
      </div>
      <div class="fg">
        <label class="fl">경기 결과 선택</label>
        <div class="res-btns">
          <button class="res-btn" id="rBtnA" onclick="selectResult('A')"><span id="rLblA">팀A 승리</span></button>
          <button class="res-btn" id="rBtnD" onclick="selectResult('D')">무승부</button>
          <button class="res-btn" id="rBtnB" onclick="selectResult('B')"><span id="rLblB">팀B 승리</span></button>
        </div>
      </div>
      <div class="frow2">
        <div class="fg">
          <label class="fl">경기장 배정</label>
          <select class="fc" id="mArena">
            <option value="">선택</option>
            <option value="1">경기장 1</option>
            <option value="2">경기장 2</option>
            <option value="3">경기장 3</option>
            <option value="4">경기장 4</option>
            <option value="5">경기장 5</option>
            <option value="6">경기장 6</option>
          </select>
        </div>
        <div class="fg">
          <label class="fl">경기 상태</label>
          <select class="fc" id="mStatus">
            <option value="pending">대기중</option>
            <option value="ongoing">진행중</option>
            <option value="done">완료</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-danger btn-sm" onclick="resetMatch()" style="margin-right:auto">초기화</button>
      <button class="btn btn-ghost" onclick="closeModal('matchOverlay')">취소</button>
      <button class="btn btn-primary" onclick="saveMatch()">저장</button>
    </div>
  </div>
</div>

<!-- Line Follow Input -->
<div class="overlay hidden" id="lfOverlay">
  <div class="modal wide">
    <div class="modal-hdr">
      <h3>🚗 라인팔로우 기록 입력</h3>
      <button class="modal-close" onclick="closeModal('lfOverlay')">✕</button>
    </div>
    <div class="modal-body">
      <p class="fw7 mb2" id="lfPName" style="font-size:1rem"></p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem">
        <div>
          <p class="fw7 mb1 small" style="color:var(--navy)">▶ 1차 경기</p>
          <div class="fg">
            <label class="fl">점수</label>
            <input type="number" class="fc" id="lf1s" min="0" placeholder="0">
          </div>
          <div class="fg">
            <label class="fl">보너스 점수</label>
            <input type="number" class="fc" id="lf1b" min="0" placeholder="0">
          </div>
          <div class="fg">
            <label class="fl">시간 (초)</label>
            <input type="number" class="fc" id="lf1t" min="0" step="0.01" placeholder="0.00">
          </div>
        </div>
        <div>
          <p class="fw7 mb1 small" style="color:var(--red)">▶ 2차 경기</p>
          <div class="fg">
            <label class="fl">점수</label>
            <input type="number" class="fc" id="lf2s" min="0" placeholder="0">
          </div>
          <div class="fg">
            <label class="fl">보너스 점수</label>
            <input type="number" class="fc" id="lf2b" min="0" placeholder="0">
          </div>
          <div class="fg">
            <label class="fl">시간 (초)</label>
            <input type="number" class="fc" id="lf2t" min="0" step="0.01" placeholder="0.00">
          </div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('lfOverlay')">취소</button>
      <button class="btn btn-primary" onclick="saveLf()">저장</button>
    </div>
  </div>
</div>

<!-- Name Edit -->
<div class="overlay hidden" id="nameOverlay">
  <div class="modal">
    <div class="modal-hdr">
      <h3>✏️ 팀/참가자 이름 수정</h3>
      <button class="modal-close" onclick="closeModal('nameOverlay')">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label class="fl">이름</label>
        <input type="text" class="fc" id="nameInput" placeholder="이름을 입력하세요" onkeydown="if(event.key==='Enter')saveName()">
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('nameOverlay')">취소</button>
      <button class="btn btn-primary" onclick="saveName()">저장</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     HEADER
════════════════════════════════════════════════════════ -->
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">🤖</div>
    <div class="hdr-txt">
      <div class="title">RoboRave Korea Open</div>
      <div class="sub">Competition Dashboard 2026</div>
    </div>
  </div>
  <div class="hdr-actions">
    <span class="badge-admin" id="adminBadge" style="display:none">👑 관리자 모드</span>
    <button class="btn-hdr danger" id="resetBtn" style="display:none" onclick="resetAll()">🗑 초기화</button>
    <button class="btn-hdr" id="adminBtn" onclick="toggleAdmin()">관리자 로그인</button>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════════

<script>
'use strict';

/* ── CONSTANTS ───────────────────────────────────────── */
const ADMIN_PW = 'roborave2026';
const GL = ['A','B','C','D','E','F','G','H'];

/* ── STATE ───────────────────────────────────────────── */
let S;       // global state
let curView  = 'dashboard';
let sumoTab  = 'juniorSpike';
let lfTab    = 'junior';
let editMatch   = null;   // {section,catKey,matchId,ko}
let editLf      = null;   // {catKey,pid}
let editName    = null;   // {section,catKey,pid}
let curResult   = null;   // 'A'|'B'|'D'|null

/* ── DEFAULT STATE ───────────────────────────────────── */
function mkDefault() {
  return {
    isAdmin: false,
    sumo: {
      juniorSpike: mkSumo('JS', 48, 8),   // 8 grps × 6
      seniorSpike: mkSumo('SS', 12, 2),   // 2 grps × 6
      juniorOpen:  mkSumo('JO',  8, 2),   // 2 grps × 4
      seniorOpen:  mkSumo('SO',  6, 2),   // 2 grps × 3
    },
    lineFollow: {
      junior: mkLf('LFJ', 4),
      senior: mkLf('LFS', 7),
    },
    othello: mkOthello(11)
  };
}

function mkSumo(pfx, total, nGroups) {
  const perGroup = total / nGroups;
  const teams = [];
  for (let i = 0; i < total; i++) {
    teams.push({
      id:    `${pfx}${String(i+1).padStart(2,'0')}`,
      name:  `팀 ${i+1}`,
      group: Math.floor(i / perGroup)
    });
  }
  const matches = [];
  for (let g = 0; g < nGroups; g++) {
    const gt = teams.filter(t => t.group === g);
    for (let i = 0; i < gt.length; i++) {
      for (let j = i+1; j < gt.length; j++) {
        matches.push({
          id: `${pfx}_G${g}_${i}_${j}`,
          stage: 'group', group: g,
          teamA: gt[i].id, teamB: gt[j].id,
          result: null, arena: null, status: 'pending'
        });
      }
    }
  }
  // advancing = nGroups * 2 top teams
  const advancing = nGroups * 2;
  const koStage = advancing >= 16 ? 'r16' : 'sf';
  return { teams, matches, knockoutMatches: [], koStage };
}

function mkLf(pfx, count) {
  const participants = [];
  for (let i = 0; i < count; i++) {
    participants.push({
      id:    `${pfx}${String(i+1).padStart(2,'0')}`,
      name:  `참가자 ${i+1}`,
      round1: { score: null, bonus: null, time: null },
      round2: { score: null, bonus: null, time: null }
    });
  }
  return { participants };
}

function mkOthello(count) {
  const gA = Math.ceil(count / 2);  // 6
  const participants = [];
  for (let i = 0; i < count; i++) {
    participants.push({
      id:    `OT${String(i+1).padStart(2,'0')}`,
      name:  `참가자 ${i+1}`,
      group: i < gA ? 0 : 1
    });
  }
  const matches = [];
  for (let g = 0; g < 2; g++) {
    const gp = participants.filter(p => p.group === g);
    for (let i = 0; i < gp.length; i++) {
      for (let j = i+1; j < gp.length; j++) {
        matches.push({
          id: `OT_G${g}_${i}_${j}`,
          stage: 'group', group: g,
          teamA: gp[i].id, teamB: gp[j].id,
          result: null, arena: '1', status: 'pending'
        });
      }
    }
  }
  return { participants, matches, knockoutMatches: [] };
}

/* ── PERSISTENCE ─────────────────────────────────────── */
function save() {
  try { localStorage.setItem('rrk_state', JSON.stringify(S)); } catch(e) {}
}
function load() {
  try {
    const raw = localStorage.getItem('rrk_state');
    if (raw) { S = JSON.parse(raw); return; }
  } catch(e) {}
  S = mkDefault();
}

/* ── CALCULATIONS ────────────────────────────────────── */
function getStandings(teams, matches) {
  const st = {};
  teams.forEach(t => { st[t.id] = { id:t.id, name:t.name, W:0, D:0, L:0, pts:0, played:0 }; });
  matches.forEach(m => {
    if (m.status !== 'done' || !m.result) return;
    st[m.teamA].played++; st[m.teamB].played++;
    if      (m.result === 'A') { st[m.teamA].W++; st[m.teamA].pts += 3; st[m.teamB].L++; }
    else if (m.result === 'B') { st[m.teamB].W++; st[m.teamB].pts += 3; st[m.teamA].L++; }
    else                       { st[m.teamA].D++; st[m.teamA].pts++; st[m.teamB].D++; st[m.teamB].pts++; }
  });
  return Object.values(st).sort((a,b) => b.pts - a.pts || b.W - a.W || a.L - b.L);
}

function getLfRanking(participants) {
  return [...participants].map(p => {
    const r1 = p.round1, r2 = p.round2;
    const has1 = r1.score !== null;
    const has2 = r2.score !== null;
    let best = null, bestRnd = 0;
    if (has1 && has2) {
      const t1 = r1.score + r1.bonus, t2 = r2.score + r2.bonus;
      if (t1 > t2 || (t1 === t2 && r1.time <= r2.time)) { best = r1; bestRnd = 1; }
      else { best = r2; bestRnd = 2; }
    } else if (has1) { best = r1; bestRnd = 1; }
    else if (has2) { best = r2; bestRnd = 2; }
    return { ...p, best, bestRnd, hasBest: !!best };
  }).sort((a, b) => {
    if (!a.hasBest && !b.hasBest) return 0;
    if (!a.hasBest) return 1;
    if (!b.hasBest) return -1;
    const at = a.best.score + a.best.bonus;
    const bt = b.best.score + b.best.bonus;
    if (bt !== at) return bt - at;          // 높은 총점 우선
    return a.best.time - b.best.time;       // 낮은 시간(빠를수록) 우선
  });
}

function matchCounts(allMatches) {
  const total = allMatches.length;
  const done  = allMatches.filter(m => m.status === 'done').length;
  return { total, done, rem: total - done };
}

function globalCounts() {
  let total = 0, done = 0;
  const cats = [
    ...Object.values(S.sumo),
    S.othello
  ];
  cats.forEach(cat => {
    const g = matchCounts(cat.matches);
    const k = matchCounts(cat.knockoutMatches || []);
    total += g.total + k.total;
    done  += g.done  + k.done;
  });
  return { total, done, rem: total - done };
}

function stageLabel(cat) {
  const allGroup = cat.matches.every(m => m.status === 'done');
  if (!allGroup) {
    const done = cat.matches.filter(m => m.status === 'done').length;
    return done === 0 ? '대기중' : `조별리그 (${done}/${cat.matches.length})`;
  }
  const ko = cat.knockoutMatches || [];
  if (ko.length === 0) return '조별리그 완료 – 토너먼트 대기';
  const koDone = ko.every(m => m.status === 'done');
  if (koDone) return '✅ 완료';
  const kdone = ko.filter(m => m.status === 'done').length;
  return `토너먼트 (${kdone}/${ko.length})`;
}

function lfStageLabel(cat) {
  const all = cat.participants;
  const entered1 = all.filter(p => p.round1.score !== null).length;
  const entered2 = all.filter(p => p.round2.score !== null).length;
  if (entered1 === 0 && entered2 === 0) return '대기중';
  if (entered1 === all.length && entered2 === all.length) return '✅ 완료';
  return `진행중 (1차:${entered1}/${all.length} 2차:${entered2}/${all.length})`;
}

/* ── ARENA STATUS ────────────────────────────────────── */
function getArenaStatus() {
  const status = {};
  const process = (matches, category, teams) => {
    matches.forEach(m => {
      if (!m.arena) return;
      const a = String(m.arena);
      if (m.status === 'ongoing' || (m.status === 'done' && !status[a])) {
        const tA = teams.find(t => t.id === m.teamA);
        const tB = teams.find(t => t.id === m.teamB);
        if (!status[a] || m.status === 'ongoing') {
          status[a] = {
            teamA: tA?.name || m.teamA,
            teamB: tB?.name || m.teamB,
            cat: category,
            done: m.status === 'done',
            ongoing: m.status === 'ongoing'
          };
        }
      }
    });
  };
  const sumoNames = { juniorSpike:'Junior Spike', seniorSpike:'Senior Spike', juniorOpen:'Junior Open', seniorOpen:'Senior Open' };
  Object.entries(S.sumo).forEach(([k, cat]) => {
    process(cat.matches, `SUMO · ${sumoNames[k]}`, cat.teams);
    process(cat.knockoutMatches || [], `SUMO · ${sumoNames[k]}`, cat.teams);
  });
  process(S.othello.matches, 'OTHELLO', S.othello.participants);
  process(S.othello.knockoutMatches || [], 'OTHELLO', S.othello.participants);
  return status;
}

/* ── RENDER: DASHBOARD ───────────────────────────────── */
function renderDashboard() {
  const gc = globalCounts();
  const pct = gc.total ? Math.round(gc.done/gc.total*100) : 0;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-lbl">총 경기 수</div><div class="stat-val">${gc.total}</div><div class="stat-sub">전체 경기</div></div>
    <div class="stat-card green"><div class="stat-lbl">완료</div><div class="stat-val">${gc.done}</div><div class="stat-sub">경기 완료</div></div>
    <div class="stat-card orange"><div class="stat-lbl">남은 경기</div><div class="stat-val">${gc.rem}</div><div class="stat-sub">진행 예정</div></div>
    <div class="stat-card" style="border-left-color:var(--navy2)"><div class="stat-lbl">진행률</div><div class="stat-val">${pct}%</div><div class="stat-sub"><div class="prog-bar mt1"><div class="prog-fill" style="width:${pct}%"></div></div></div></div>
  `;

  // Summary table
  const rows = [
    { sport:'🥋 SUMO', cat:'Junior Spike', teams:48, getData:()=>S.sumo.juniorSpike },
    { sport:'🥋 SUMO', cat:'Senior Spike', teams:12, getData:()=>S.sumo.seniorSpike },
    { sport:'🥋 SUMO', cat:'Junior Open',  teams:8,  getData:()=>S.sumo.juniorOpen  },
    { sport:'🥋 SUMO', cat:'Senior Open',  teams:6,  getData:()=>S.sumo.seniorOpen  },
    { sport:'🚗 LINE FOLLOW', cat:'Junior', teams:4, isLf:true, getData:()=>S.lineFollow.junior },
    { sport:'🚗 LINE FOLLOW', cat:'Senior', teams:7, isLf:true, getData:()=>S.lineFollow.senior },
    { sport:'⚫ OTHELLO', cat:'-', teams:11, getData:()=>S.othello },
  ];
  document.getElementById('summaryTbody').innerHTML = rows.map(row => {
    let total, done, stage;
    if (row.isLf) {
      const all = row.getData().participants;
      total = all.length * 2;
      done  = all.filter(p => p.round1.score !== null).length + all.filter(p => p.round2.score !== null).length;
      stage = lfStageLabel(row.getData());
    } else {
      const cat = row.getData();
      const g = matchCounts(cat.matches);
      const k = matchCounts(cat.knockoutMatches || []);
      total = g.total + k.total;
      done  = g.done  + k.done;
      stage = stageLabel(cat);
    }
    const p = total ? Math.round(done/total*100) : 0;
    const statusBadge = stage.startsWith('✅')
      ? `<span class="badge badge-done">✓ 완료</span>`
      : stage === '대기중'
        ? `<span class="badge badge-pending">대기중</span>`
        : `<span class="badge badge-ongoing">● 진행중</span>`;
    return `<tr>
      <td class="fw7">${row.sport}</td>
      <td>${row.cat}</td>
      <td>${row.teams}</td>
      <td>${statusBadge} <span class="small muted">${stage}</span></td>
      <td style="min-width:110px"><div class="flex ai-c gap1"><div class="prog-bar" style="flex:1"><div class="prog-fill" style="width:${p}%"></div></div><span class="small">${p}%</span></div></td>
      <td class="small">${done} / ${total}</td>
    </tr>`;
  }).join('');

  // Arena grid
  const arenaStatus = getArenaStatus();
  document.getElementById('arenaGrid').innerHTML = Array.from({length:6}, (_,i) => {
    const a = String(i+1);
    const st = arenaStatus[a];
    let cls='', teams='<span class="muted small">대기중</span>', cat='';
    if (st) {
      cls = st.ongoing ? 'active' : 'done';
      teams = `${st.teamA}<br><span class="muted small">vs</span><br>${st.teamB}`;
      cat = st.cat;
    }
    return `<div class="arena-card ${cls}">
      <div class="arena-num">경기장 ${i+1}</div>
      <div class="arena-teams">${teams}</div>
      ${cat ? `<div class="arena-cat">${cat}</div>` : ''}
    </div>`;
  }).join('');

  // LF arenas
  document.getElementById('lfArenaGrid').innerHTML = [
    { label:'Junior 경기장', cat: S.lineFollow.junior },
    { label:'Senior 경기장', cat: S.lineFollow.senior },
  ].map(({label, cat}) => {
    const entered = cat.participants.filter(p => p.round1.score !== null || p.round2.score !== null).length;
    const total   = cat.participants.length;
    const cls = entered === total ? 'done' : entered > 0 ? 'lf' : '';
    return `<div class="arena-card ${cls}">
      <div class="arena-num">${label}</div>
      <div class="arena-teams small" style="font-size:.82rem">${entered}/${total} 기록 입력</div>
    </div>`;
  }).join('');

  document.getElementById('updatedAt').textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
}

/* ── RENDER: SUMO ────────────────────────────────────── */
function renderSumo() {
  const cat = S.sumo[sumoTab];
  const nGroups = [...new Set(cat.teams.map(t => t.group))].length;
  let html = '';

  // Group standings cards
  html += `<div class="gauto mb2">`;
  for (let g = 0; g < nGroups; g++) {
    const gt = cat.teams.filter(t => t.group === g);
    const gm = cat.matches.filter(m => m.group === g);
    const standings = getStandings(gt, gm);
    const done = gm.filter(m => m.status === 'done').length;
    const advancing = 2;

    html += `<div class="card">
      <div class="card-hdr">
        <div class="card-title"><span class="gl-${GL[g]}">●</span> 그룹 ${GL[g]} <span class="small muted" style="font-weight:400">${gt.length}팀 · ${done}/${gm.length}경기</span></div>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>순위</th>
          <th>팀명 ${S.isAdmin ? '<span class="small muted">(클릭=수정)</span>':''}</th>
          <th>경기</th><th class="win">승</th><th class="draw-c">무</th><th class="lose">패</th><th>승점</th>
        </tr></thead>
        <tbody>${standings.map((s, idx) => {
          const rc = idx===0?'tr-1st':idx===1?'tr-2nd':'';
          const adv = idx < advancing ? `<span class="badge badge-adv">↑진출</span>` : '';
          const nm = S.isAdmin
            ? `<span class="editable" onclick="openName('sumo','${sumoTab}','${s.id}')">${s.name}</span>`
            : s.name;
          return `<tr class="${rc}"><td class="fw7">${idx+1}</td><td>${nm} ${adv}</td><td>${s.played}</td><td class="win fw7">${s.W}</td><td class="draw-c">${s.D}</td><td class="lose">${s.L}</td><td class="fw7">${s.pts}</td></tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
  }
  html += `</div>`;

  // Admin: generate knockout button
  if (S.isAdmin) {
    const koReady = cat.matches.every(m => m.status === 'done');
    const hasKo   = (cat.knockoutMatches || []).length > 0;
    if (!hasKo) {
      html += `<div class="warn-box">조별리그 완료 후 아래 버튼으로 토너먼트를 생성하세요. ${!koReady?'(아직 완료되지 않은 경기가 있습니다)':''}</div>`;
      html += `<button class="btn btn-primary mb2" onclick="genSumoKO('${sumoTab}')">🏆 토너먼트 브래킷 생성</button>`;
    } else {
      html += `<button class="btn btn-ghost btn-sm mb2" onclick="if(confirm('토너먼트를 초기화할까요?')){S.sumo['${sumoTab}'].knockoutMatches=[];save();renderSumo()}">토너먼트 초기화</button>`;
    }
  }

  // Match list (group stage)
  html += `<div class="card mb2">
    <div class="card-hdr">
      <div class="card-title">📋 조별리그 경기 목록</div>
      <span class="small muted">${S.isAdmin ? '경기 클릭 → 결과 입력':'보기 모드'}</span>
    </div>
    <div class="card-body">`;

  for (let g = 0; g < nGroups; g++) {
    const gm = cat.matches.filter(m => m.group === g);
    const done = gm.filter(m => m.status === 'done').length;
    html += `<div class="mb2">
      <div class="flex ai-c gap1 mb1">
        <span class="fw7 small gl-${GL[g]}">그룹 ${GL[g]}</span>
        <span class="muted small">${done}/${gm.length} 완료</span>
        <div class="prog-bar" style="flex:1;max-width:120px"><div class="prog-fill" style="width:${gm.length?Math.round(done/gm.length*100):0}%"></div></div>
      </div>
      <div class="match-list">${gm.map(m => renderMatchItem(m, cat.teams, 'sumo', sumoTab, false)).join('')}</div>
    </div>`;
  }
  html += `</div></div>`;

  // Knockout
  if ((cat.knockoutMatches || []).length > 0) {
    html += renderKOSection(cat, sumoTab, cat.teams, 'sumo');
  }

  document.getElementById('sumoContent').innerHTML = html;
}

function renderMatchItem(m, teams, section, catKey, ko) {
  const tA = teams.find(t => t.id === m.teamA);
  const tB = teams.find(t => t.id === m.teamB);
  const nA = tA?.name || m.teamA || 'TBD';
  const nB = tB?.name || m.teamB || 'TBD';
  const sc = m.status==='done'?'done':m.status==='ongoing'?'ongoing':'';
  const click = S.isAdmin ? `clickable" onclick="openMatch('${section}','${catKey}','${m.id}',${ko})` : '';
  const resultHtml = m.result
    ? (m.result==='A' ? `<span class="match-result win">${nA} 승</span>`
       : m.result==='B' ? `<span class="match-result win">${nB} 승</span>`
       : `<span class="match-result draw-c">무승부</span>`)
    : '';
  const arenaHtml = m.arena ? `<span class="match-arena-lbl">📍${m.arena}번</span>` : '';
  const badgeHtml = m.status==='done'
    ? `<span class="badge badge-done">완료</span>`
    : m.status==='ongoing'
      ? `<span class="badge badge-ongoing">진행중</span>`
      : `<span class="badge badge-pending">대기</span>`;
  return `<div class="match-item ${sc} ${click}">
    <div class="match-teams">
      <span class="match-team">${nA}</span>
      <span class="match-vs">vs</span>
      <span class="match-team">${nB}</span>
    </div>
    ${arenaHtml}${resultHtml}${badgeHtml}
  </div>`;
}

function renderKOSection(cat, catKey, teams, section) {
  const byStage = {};
  (cat.knockoutMatches || []).forEach(m => {
    if (!byStage[m.stage]) byStage[m.stage] = [];
    byStage[m.stage].push(m);
  });
  const stageOrder = ['r16','qf','sf','final'];
  const stageNames = { r16:'⚡ 16강', qf:'🔥 8강', sf:'🏅 4강', final:'🏆 결승' };

  let html = `<div class="card"><div class="card-hdr"><div class="card-title">🏆 토너먼트 브래킷</div></div><div class="card-body">`;
  stageOrder.forEach(stage => {
    if (!byStage[stage]) return;
    html += `<div class="bracket-section">
      <div class="bracket-stage-title">${stageNames[stage]}</div>
      <div class="match-list">${byStage[stage].map(m => renderMatchItem(m, teams, section, catKey, true)).join('')}</div>
    </div>`;
  });
  html += `</div></div>`;
  return html;
}

/* ── KNOCKOUT GENERATION ─────────────────────────────── */
function genSumoKO(catKey) {
  const cat = S.sumo[catKey];
  const nGroups = [...new Set(cat.teams.map(t => t.group))].length;
  const advancing = [];
  for (let g = 0; g < nGroups; g++) {
    const gt = cat.teams.filter(t => t.group === g);
    const gm = cat.matches.filter(m => m.group === g);
    const st = getStandings(gt, gm);
    advancing.push(st[0]?.id || null, st[1]?.id || null);
  }

  const pfx = catKey;
  const matches = [];

  if (cat.koStage === 'r16') {
    // 16강: 8 matches
    for (let i = 0; i < 8; i++) {
      matches.push({ id:`${pfx}_r16_${i}`, stage:'r16',
        teamA: advancing[i*2] || null, teamB: advancing[i*2+1] || null,
        result:null, arena:null, status:'pending' });
    }
    // 8강: 4 matches (TBD)
    for (let i = 0; i < 4; i++) {
      matches.push({ id:`${pfx}_qf_${i}`, stage:'qf',
        teamA:null, teamB:null, result:null, arena:null, status:'pending' });
    }
    // 4강: 2 matches
    for (let i = 0; i < 2; i++) {
      matches.push({ id:`${pfx}_sf_${i}`, stage:'sf',
        teamA:null, teamB:null, result:null, arena:null, status:'pending' });
    }
  } else {
    // 4강: 2 matches
    matches.push({ id:`${pfx}_sf_0`, stage:'sf',
      teamA: advancing[0]||null, teamB: advancing[3]||null,
      result:null, arena:null, status:'pending' });
    matches.push({ id:`${pfx}_sf_1`, stage:'sf',
      teamA: advancing[1]||null, teamB: advancing[2]||null,
      result:null, arena:null, status:'pending' });
  }
  // 결승
  matches.push({ id:`${pfx}_final_0`, stage:'final',
    teamA:null, teamB:null, result:null, arena:null, status:'pending' });

  cat.knockoutMatches = matches;
  save();
  renderSumo();
}

function genOthelloKO() {
  const cat = S.othello;
  const advancing = [];
  for (let g = 0; g < 2; g++) {
    const gp = cat.participants.filter(p => p.group === g);
    const gm = cat.matches.filter(m => m.group === g);
    const st = getStandings(gp, gm);
    advancing.push(st[0]?.id || null, st[1]?.id || null);
  }
  cat.knockoutMatches = [
    { id:'OT_sf_0', stage:'sf', teamA:advancing[0]||null, teamB:advancing[3]||null, result:null, arena:'1', status:'pending' },
    { id:'OT_sf_1', stage:'sf', teamA:advancing[1]||null, teamB:advancing[2]||null, result:null, arena:'1', status:'pending' },
    { id:'OT_final_0', stage:'final', teamA:null, teamB:null, result:null, arena:'1', status:'pending' },
  ];
  save();
  renderOthello();
}

/* ── RENDER: LINE FOLLOW ─────────────────────────────── */
function renderLineFollow() {
  const cat = S.lineFollow[lfTab];
  const ranking = getLfRanking(cat.participants);

  let html = `<div class="card">
    <div class="card-hdr">
      <div class="card-title">📊 기록 및 순위</div>
      ${S.isAdmin ? `<span class="small muted">참가자 이름 클릭=수정</span>` : ''}
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th>순위</th>
        <th>참가자</th>
        <th>1차 점수</th><th>1차 보너스</th><th>1차 시간</th>
        <th>2차 점수</th><th>2차 보너스</th><th>2차 시간</th>
        <th style="background:#fff9e6">최고점수</th>
        <th style="background:#fff9e6">최고보너스</th>
        <th style="background:#fff9e6">최고시간</th>
        <th style="background:#fff9e6">채택</th>
        ${S.isAdmin ? '<th>기록 입력</th>' : ''}
      </tr></thead>
      <tbody>`;

  ranking.forEach((p, idx) => {
    const rc = idx===0?'tr-1st':idx===1?'tr-2nd':idx===2?'tr-3rd':'';
    const r1 = p.round1, r2 = p.round2;
    const f = (v) => v !== null ? v : '-';
    const ft = (v) => v !== null ? v + '초' : '-';
    const nm = S.isAdmin
      ? `<span class="editable" onclick="openName('lf','${lfTab}','${p.id}')">${p.name}</span>`
      : p.name;
    const best = p.hasBest ? p.best : null;
    const rankIcon = idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':'';
    html += `<tr class="${rc}">
      <td class="fw7">${rankIcon}${idx+1}</td>
      <td class="fw7">${nm}</td>
      <td>${f(r1.score)}</td><td>${f(r1.bonus)}</td><td>${ft(r1.time)}</td>
      <td>${f(r2.score)}</td><td>${f(r2.bonus)}</td><td>${ft(r2.time)}</td>
      <td style="background:#fff9e6" class="fw7">${best ? best.score : '-'}</td>
      <td style="background:#fff9e6" class="fw7">${best ? best.bonus : '-'}</td>
      <td style="background:#fff9e6" class="fw7">${best ? best.time+'초' : '-'}</td>
      <td style="background:#fff9e6">${p.hasBest ? `<span class="badge ${p.bestRnd===1?'badge-done':'badge-ongoing'}">${p.bestRnd}차</span>` : '-'}</td>
      ${S.isAdmin ? `<td><button class="btn btn-primary btn-xs" onclick="openLf('${lfTab}','${p.id}')">입력</button></td>` : ''}
    </tr>`;
  });

  html += `</tbody></table></div></div>
    <div class="info-box mt2">
      <strong>순위 결정 기준:</strong> 1차·2차 경기 중 더 좋은 기록 채택 →
      ① 점수+보너스 합계 높은 순 ② 동점 시 시간 짧은 순 (빠를수록 우리)
    </div>`;

  document.getElementById('lfContent').innerHTML = html;
}

/* ── RENDER: OTHELLO ─────────────────────────────────── */
function renderOthello() {
  const cat = S.othello;
  let html = `<div class="g2 mb2">`;

  for (let g = 0; g < 2; g++) {
    const gp = cat.participants.filter(p => p.group === g);
    const gm = cat.matches.filter(m => m.group === g);
    const standings = getStandings(gp, gm);
    const done = gm.filter(m => m.status === 'done').length;

    html += `<div class="card">
      <div class="card-hdr">
        <div class="card-title"><span class="gl-${GL[g]}">●</span> 그룹 ${GL[g]} <span class="small muted">${gp.length}명 · ${done}/${gm.length}경기</span></div>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>순위</th>
          <th>참가자 ${S.isAdmin ? '<span class="small muted">(클릭=수정)</span>':''}</th>
          <th>경기</th><th class="win">승</th><th class="draw-c">무</th><th class="lose">패</th><th>승점</th>
        </tr></thead>
        <tbody>${standings.map((s, idx) => {
          const rc = idx===0?'tr-1st':idx===1?'tr-2nd':'';
          const adv = idx < 2 ? `<span class="badge badge-adv">↑4강</span>` : '';
          const nm = S.isAdmin
            ? `<span class="editable" onclick="openName('othello','','${s.id}')">${s.name}</span>`
            : s.name;
          return `<tr class="${rc}"><td class="fw7">${idx+1}</td><td>${nm} ${adv}</td><td>${s.played}</td><td class="win fw7">${s.W}</td><td class="draw-c">${s.D}</td><td class="lose">${s.L}</td><td class="fw7">${s.pts}</td></tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
  }
  html += `</div>`;

  // Admin: knockout button
  if (S.isAdmin) {
    const hasKo = (cat.knockoutMatches || []).length > 0;
    if (!hasKo) {
      html += `<button class="btn btn-primary mb2" onclick="genOthelloKO()">🏆 4강 브래킷 생성</button>`;
    } else {
      html += `<button class="btn btn-ghost btn-sm mb2" onclick="if(confirm('토너먼트를 초기화할까요?')){S.othello.knockoutMatches=[];save();renderOthello()}">토너먼트 초기화</button>`;
    }
  }

  // Match list
  html += `<div class="card mb2">
    <div class="card-hdr"><div class="card-title">📋 조별리그 경기 목록 (경기장 1개)</div></div>
    <div class="card-body">`;
  for (let g = 0; g < 2; g++) {
    const gm = cat.matches.filter(m => m.group === g);
    const done = gm.filter(m => m.status === 'done').length;
    html += `<div class="mb2">
      <div class="flex ai-c gap1 mb1">
        <span class="fw7 small gl-${GL[g]}">그룹 ${GL[g]}</span>
        <span class="muted small">${done}/${gm.length} 완료</span>
      </div>
      <div class="match-list">${gm.map(m => renderMatchItem(m, cat.participants, 'othello', '', false)).join('')}</div>
    </div>`;
  }
  html += `</div></div>`;

  if ((cat.knockoutMatches || []).length > 0) {
    html += renderKOSection(cat, '', cat.participants, 'othello');
  }

  document.getElementById('othelloContent').innerHTML = html;
}

/* ── MATCH MODAL ─────────────────────────────────────── */
function openMatch(section, catKey, matchId, ko=false) {
  if (!S.isAdmin) return;
  editMatch = { section, catKey, matchId, ko };

  let match, teams;
  if (section === 'sumo') {
    const cat = S.sumo[catKey];
    match = ko ? cat.knockoutMatches.find(m=>m.id===matchId) : cat.matches.find(m=>m.id===matchId);
    teams = cat.teams;
  } else {
    const cat = S.othello;
    match = ko ? cat.knockoutMatches.find(m=>m.id===matchId) : cat.matches.find(m=>m.id===matchId);
    teams = cat.participants;
  }
  if (!match) return;

  const tA = teams.find(t=>t.id===match.teamA);
  const tB = teams.find(t=>t.id===match.teamB);
  const nA = tA?.name || match.teamA || 'TBD';
  const nB = tB?.name || match.teamB || 'TBD';

  document.getElementById('mTeamA').textContent = nA;
  document.getElementById('mTeamB').textContent = nB;
  document.getElementById('rLblA').textContent = nA + ' 승리';
  document.getElementById('rLblB').textContent = nB + ' 승리';

  // Arena options
  const arenaEl = document.getElementById('mArena');
  if (section === 'othello') {
    arenaEl.innerHTML = '<option value="1">경기장 1</option>';
    arenaEl.value = '1';
    arenaEl.disabled = true;
  } else {
    arenaEl.disabled = false;
    arenaEl.innerHTML = '<option value="">선택</option>' +
      Array.from({length:6},(_,i)=>`<option value="${i+1}">경기장 ${i+1}</option>`).join('');
    arenaEl.value = match.arena || '';
  }
  document.getElementById('mStatus').value = match.status || 'pending';

  curResult = match.result || null;
  updateResButtons();
  document.getElementById('matchOverlay').classList.remove('hidden');
}

function selectResult(r) { curResult = r; updateResButtons(); }
function updateResButtons() {
  document.getElementById('rBtnA').className = 'res-btn' + (curResult==='A'?' sel-a':'');
  document.getElementById('rBtnD').className = 'res-btn' + (curResult==='D'?' sel-d':'');
  document.getElementById('rBtnB').className = 'res-btn' + (curResult==='B'?' sel-b':'');
}
function resetMatch() { curResult=null; updateResButtons(); document.getElementById('mStatus').value='pending'; document.getElementById('mArena').value=''; }

function saveMatch() {
  if (!editMatch) return;
  const { section, catKey, matchId, ko } = editMatch;
  let match;
  if (section === 'sumo') {
    const cat = S.sumo[catKey];
    match = ko ? cat.knockoutMatches.find(m=>m.id===matchId) : cat.matches.find(m=>m.id===matchId);
  } else {
    const cat = S.othello;
    match = ko ? cat.knockoutMatches.find(m=>m.id===matchId) : cat.matches.find(m=>m.id===matchId);
  }
  if (!match) return;
  match.result = curResult;
  match.arena  = document.getElementById('mArena').value || null;
  match.status = document.getElementById('mStatus').value;
  save();
  closeModal('matchOverlay');
  renderCurrent();
}

/* ── LINE FOLLOW MODAL ───────────────────────────────── */
function openLf(catKey, pid) {
  if (!S.isAdmin) return;
  editLf = { catKey, pid };
  const p = S.lineFollow[catKey].participants.find(p=>p.id===pid);
  if (!p) return;
  document.getElementById('lfPName').textContent = p.name;
  document.getElementById('lf1s').value = p.round1.score ?? '';
  document.getElementById('lf1b').value = p.round1.bonus ?? '';
  document.getElementById('lf1t').value = p.round1.time  ?? '';
  document.getElementById('lf2s').value = p.round2.score ?? '';
  document.getElementById('lf2b').value = p.round2.bonus ?? '';
  document.getElementById('lf2t').value = p.round2.time  ?? '';
  document.getElementById('lfOverlay').classList.remove('hidden');
}

function saveLf() {
  if (!editLf) return;
  const { catKey, pid } = editLf;
  const p = S.lineFollow[catKey].participants.find(p=>p.id===pid);
  if (!p) return;
  const pn = (id) => { const v = document.getElementById(id).value; return v==='' ? null : parseFloat(v); };
  p.round1 = { score:pn('lf1s'), bonus:pn('lf1b'), time:pn('lf1t') };
  p.round2 = { score:pn('lf2s'), bonus:pn('lf2b'), time:pn('lf2t') };
  save();
  closeModal('lfOverlay');
  renderCurrent();
}

/* ── NAME MODAL ──────────────────────────────────────── */
function openName(section, catKey, pid) {
  if (!S.isAdmin) return;
  editName = { section, catKey, pid };
  let ent;
  if (section==='sumo')   ent = S.sumo[catKey].teams.find(t=>t.id===pid);
  else if (section==='lf') ent = S.lineFollow[catKey].participants.find(p=>p.id===pid);
  else                     ent = S.othello.participants.find(p=>p.id===pid);
  document.getElementById('nameInput').value = ent?.name || '';
  document.getElementById('nameOverlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('nameInput').select(), 50);
}

function saveName() {
  if (!editName) return;
  const { section, catKey, pid } = editName;
  const newName = document.getElementById('nameInput').value.trim();
  if (!newName) return;
  let ent;
  if (section==='sumo')    ent = S.sumo[catKey].teams.find(t=>t.id===pid);
  else if (section==='lf') ent = S.lineFollow[catKey].participants.find(p=>p.id===pid);
  else                     ent = S.othello.participants.find(p=>p.id===pid);
  if (ent) ent.name = newName;
  save();
  closeModal('nameOverlay');
  renderCurrent();
}

/* ── MODAL HELPERS ───────────────────────────────────── */
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

/* ── ADMIN ───────────────────────────────────────────── */
function toggleAdmin() {
  if (S.isAdmin) {
    S.isAdmin = false; save(); updateAdminUI(); renderCurrent();
  } else {
    document.getElementById('pwInput').value = '';
    document.getElementById('loginErr').style.display = 'none';
    document.getElementById('loginOverlay').classList.remove('hidden');
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
  }
}

function doLogin() {
  if (document.getElementById('pwInput').value === ADMIN_PW) {
    S.isAdmin = true; save();
    closeModal('loginOverlay');
    updateAdminUI();
    renderCurrent();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function updateAdminUI() {
  const a = S.isAdmin;
  document.getElementById('adminBadge').style.display = a ? 'inline-flex' : 'none';
  document.getElementById('adminBtn').textContent = a ? '관리자 로그아웃' : '관리자 로그인';
  document.getElementById('resetBtn').style.display = a ? 'inline-block' : 'none';
}

function resetAll() {
  if (!confirm('⚠️ 모든 경기 데이터를 초기화합니까?\n이 작업은 되돌릴 수 없습니다!')) return;
  const wasAdmin = S.isAdmin;
  S = mkDefault();
  S.isAdmin = wasAdmin;
  save();
  renderAll();
}

/* ── NAVIGATION ──────────────────────────────────────── */
function showView(v) {
  curView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['dashboard','sumo','linefollow','othello'][i] === v);
  });
  renderCurrent();
}

function setSumoTab(tab) {
  sumoTab = tab;
  document.querySelectorAll('#view-sumo .tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['juniorSpike','seniorSpike','juniorOpen','seniorOpen'][i] === tab);
  });
  renderSumo();
}

function setLfTab(tab) {
  lfTab = tab;
  document.querySelectorAll('#view-linefollow .tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['junior','senior'][i] === tab);
  });
  renderLineFollow();
}

function renderCurrent() {
  if (curView==='dashboard') renderDashboard();
  else if (curView==='sumo') renderSumo();
  else if (curView==='linefollow') renderLineFollow();
  else if (curView==='othello') renderOthello();
}

function renderAll() {
  renderDashboard();
  if (curView==='sumo') renderSumo();
  else if (curView==='linefollow') renderLineFollow();
  else if (curView==='othello') renderOthello();
}

/* ── INIT ────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  load();
  updateAdminUI();
  renderDashboard();
  // Close modals on overlay click
  ['loginOverlay','matchOverlay','lfOverlay','nameOverlay'].forEach(id => {
    document.getElementById(id).addEventListener('click', function(e) {
      if (e.target === this) closeModal(id);
    });
  });
  // Auto-refresh timestamp
  setInterval(() => {
    const el = document.getElementById('updatedAt');
    if (el && curView==='dashboard') el.textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
  }, 60000);
});
</script>

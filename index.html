<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a3a6b">
<title>RoboRave Korea Open</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
/* ── VARIABLES ───────────────────────────────────────── */
:root {
  --navy:#1a3a6b; --navy2:#2456a4;
  --red:#e63946; --gold:#f4c430; --green:#06c87e; --orange:#f4874b;
  --bg:#eef2f7; --g100:#f8f9fa; --g200:#e9ecef; --g300:#dee2e6;
  --g400:#ced4da; --g500:#adb5bd; --g600:#6c757d; --g800:#343a40;
  --text:#1e293b;
  --sh1:0 1px 4px rgba(0,0,0,.10);
  --sh2:0 4px 14px rgba(0,0,0,.13);
  --sh3:0 8px 28px rgba(0,0,0,.20);
  --r:8px; --rl:14px;
  --bnav:64px;       /* bottom nav height */
  --safe-b:env(safe-area-inset-bottom,0px);
}

/* ── RESET ───────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;font-size:14px;
  padding-bottom:calc(var(--bnav) + var(--safe-b))
}
button{cursor:pointer;border:none;font-family:inherit;font-size:inherit;-webkit-tap-highlight-color:transparent}
input,select{font-family:inherit;font-size:inherit}
img{max-width:100%}

/* ── HEADER ───────────────────────────────────────────── */
.hdr{
  background:linear-gradient(135deg,#0f2548,var(--navy2));
  color:#fff;padding:.65rem 1rem .65rem 1.1rem;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--sh2);position:sticky;top:0;z-index:200;gap:.75rem;
  padding-top:max(.65rem, env(safe-area-inset-top))
}
.hdr-brand{display:flex;align-items:center;gap:.6rem;min-width:0}
.hdr-logo{font-size:1.6rem;line-height:1;flex-shrink:0}
.hdr-txt{min-width:0}
.hdr-txt .title{font-size:.95rem;font-weight:800;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-txt .sub{font-size:.68rem;opacity:.7;margin-top:.05rem;white-space:nowrap}
.hdr-actions{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.badge-admin{background:var(--gold);color:#1a2a00;padding:.2rem .55rem;border-radius:20px;font-size:.7rem;font-weight:800;white-space:nowrap}
.btn-hdr{
  background:rgba(255,255,255,.14);color:#fff;
  border:1px solid rgba(255,255,255,.28);
  padding:.35rem .7rem;border-radius:6px;
  font-size:.76rem;font-weight:600;transition:background .2s;white-space:nowrap
}
.btn-hdr:hover,.btn-hdr:active{background:rgba(255,255,255,.26)}
.btn-hdr.danger{background:rgba(220,50,50,.3);border-color:rgba(220,50,50,.5)}

/* ── TOP NAV (desktop) ───────────────────────────────── */
.top-nav{
  background:#fff;border-bottom:2px solid var(--g200);
  display:flex;padding:0 1rem;overflow-x:auto;
  box-shadow:var(--sh1);scrollbar-width:none
}
.top-nav::-webkit-scrollbar{display:none}
.nav-btn{
  padding:.8rem 1.1rem;font-size:.85rem;font-weight:700;
  color:var(--g600);border-bottom:3px solid transparent;
  background:none;white-space:nowrap;transition:all .2s;
  display:flex;align-items:center;gap:.35rem;flex-shrink:0;
  min-height:44px
}
.nav-btn:hover,.nav-btn:active{color:var(--navy)}
.nav-btn.active{color:var(--navy);border-bottom-color:var(--navy)}

/* ── BOTTOM NAV (mobile) ─────────────────────────────── */
.bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:#fff;border-top:1px solid var(--g200);
  box-shadow:0 -2px 12px rgba(0,0,0,.1);
  padding-bottom:var(--safe-b)
}
.bottom-nav-inner{display:grid;grid-template-columns:repeat(4,1fr)}
.bnav-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:.55rem .25rem;gap:.15rem;background:none;
  color:var(--g500);transition:color .15s;min-height:var(--bnav);
  -webkit-tap-highlight-color:transparent
}
.bnav-btn .bnav-ico{font-size:1.3rem;line-height:1}
.bnav-btn .bnav-lbl{font-size:.62rem;font-weight:700;letter-spacing:.01em}
.bnav-btn.active{color:var(--navy)}
.bnav-btn.active .bnav-ico{transform:scale(1.1)}

/* ── MAIN ─────────────────────────────────────────────── */
.main{padding:1rem;max-width:1440px;margin:0 auto}

/* ── CARDS ───────────────────────────────────────────── */
.card{background:#fff;border-radius:var(--rl);box-shadow:var(--sh1);overflow:hidden}
.card-hdr{padding:.8rem 1rem;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap}
.card-title{font-size:.9rem;font-weight:800;display:flex;align-items:center;gap:.35rem}
.card-body{padding:1rem}

/* ── BUTTONS ─────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:.3rem;padding:.45rem .9rem;border-radius:6px;font-size:.82rem;font-weight:700;transition:all .15s;cursor:pointer;min-height:38px}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:active{background:var(--navy2)}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{background:var(--g100);color:var(--g800);border:1px solid var(--g300)}
.btn-ghost:active{background:var(--g200)}
.btn-outline{background:#fff;color:var(--navy);border:1.5px solid var(--navy)}
.btn-sm{padding:.3rem .6rem;font-size:.75rem;min-height:32px}
.btn-xs{padding:.18rem .45rem;font-size:.7rem;border-radius:5px;min-height:28px}
.btn-block{width:100%;justify-content:center}

/* ── TABS ─────────────────────────────────────────────── */
.tab-bar{display:flex;gap:.45rem;margin-bottom:1rem;overflow-x:auto;padding-bottom:.1rem;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{
  padding:.4rem .85rem;border-radius:7px;font-size:.8rem;font-weight:700;
  background:#fff;color:var(--g600);border:1.5px solid var(--g300);
  transition:all .15s;text-align:center;line-height:1.3;flex-shrink:0;
  min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center
}
.tab-btn:active{background:var(--g100)}
.tab-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.tab-btn small{font-weight:400;opacity:.85;font-size:.7rem}

/* ── TABLES ──────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.84rem}
thead th{background:var(--g100);padding:.5rem .65rem;text-align:left;font-weight:800;color:var(--g800);border-bottom:2px solid var(--g200);white-space:nowrap}
tbody td{padding:.48rem .65rem;border-bottom:1px solid var(--g200);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--g100)}
.tr-1st{background:#fff9e6!important}
.tr-2nd{background:#eef4ff!important}
.tr-3rd{background:#edfff6!important}

/* ── MOBILE TABLE → CARD ─────────────────────────────── */
/* Standings card layout on narrow screens */
.standings-mobile{display:none}
.scard{
  border:1px solid var(--g200);border-radius:var(--r);
  padding:.7rem .85rem;margin-bottom:.5rem;background:#fff;
  display:flex;align-items:center;gap:.75rem
}
.scard.sc-1st{border-color:#f4c430;background:#fff9e6}
.scard.sc-2nd{border-color:#93c5fd;background:#eef4ff}
.scard-rank{font-size:1.3rem;font-weight:900;width:2rem;text-align:center;flex-shrink:0}
.scard-info{flex:1;min-width:0}
.scard-name{font-weight:800;font-size:.9rem;margin-bottom:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scard-stats{display:flex;gap:.6rem;font-size:.75rem;color:var(--g600);flex-wrap:wrap}
.scard-pts{font-size:1.1rem;font-weight:900;color:var(--navy);flex-shrink:0}

/* LF mobile cards */
.lf-cards{display:none}
.lf-card{
  border:1.5px solid var(--g200);border-radius:var(--r);padding:.75rem 1rem;
  margin-bottom:.6rem;background:#fff
}
.lf-card.lfc-1st{border-color:#f4c430;background:#fff9e6}
.lf-card.lfc-2nd{border-color:#93c5fd;background:#eef4ff}
.lf-card.lfc-3rd{border-color:#6ee7b7;background:#edfff6}
.lf-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.lf-card-name{font-weight:800;font-size:.95rem}
.lf-card-rank{font-size:1.1rem}
.lf-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem .75rem;font-size:.78rem}
.lf-card-grid dt{color:var(--g500);font-weight:600}
.lf-card-grid dd{font-weight:700}

/* ── BADGES ──────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:.2rem;padding:.18rem .5rem;border-radius:20px;font-size:.68rem;font-weight:800;white-space:nowrap}
.badge-done{background:#d1fae5;color:#065f46}
.badge-ongoing{background:#fef3c7;color:#92400e;animation:pulse 1.5s infinite}
.badge-pending{background:var(--g200);color:var(--g600)}
.badge-adv{background:#fef3c7;color:#92400e;font-size:.62rem}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ── STATS ───────────────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:1rem}
.stat-card{background:#fff;border-radius:var(--r);padding:.85rem 1rem;box-shadow:var(--sh1);border-left:4px solid var(--navy)}
.stat-card.green{border-left-color:var(--green)}
.stat-card.orange{border-left-color:var(--orange)}
.stat-card.navy2{border-left-color:var(--navy2)}
.stat-lbl{font-size:.66rem;font-weight:800;color:var(--g600);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.15rem}
.stat-val{font-size:1.8rem;font-weight:900;color:var(--text);line-height:1}
.stat-sub{font-size:.7rem;color:var(--g500);margin-top:.15rem}

/* ── ARENA ───────────────────────────────────────────── */
.arena-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem}
.arena-card{border:2px solid var(--g300);border-radius:var(--r);padding:.65rem .5rem;text-align:center;transition:all .2s;background:#fff}
.arena-card.active{border-color:var(--orange);background:#fff8f2}
.arena-card.done{border-color:var(--green);background:#f0fff8}
.arena-card.lf{border-color:#a78bfa;background:#faf5ff}
.arena-num{font-size:.65rem;font-weight:800;color:var(--g500);text-transform:uppercase;letter-spacing:.06em}
.arena-teams{font-size:.78rem;font-weight:700;margin-top:.2rem;line-height:1.4}
.arena-cat{font-size:.65rem;color:var(--g600);margin-top:.1rem;font-style:italic}

/* ── MATCH ITEMS ─────────────────────────────────────── */
.match-list{display:flex;flex-direction:column;gap:.32rem}
.match-item{
  display:flex;align-items:center;gap:.45rem;
  padding:.55rem .75rem;border:1.5px solid var(--g200);
  border-radius:8px;transition:all .15s;background:#fff;
  min-height:44px
}
.match-item.clickable{cursor:pointer}
.match-item.clickable:active{background:var(--g100);border-color:var(--navy)}
.match-item.done{border-color:#b7f5d8;background:#f0fff8}
.match-item.ongoing{border-color:#fde68a;background:#fffbeb}
.match-teams{flex:1;display:flex;align-items:center;gap:.4rem;font-size:.84rem;min-width:0;flex-wrap:wrap}
.match-team{font-weight:700;white-space:nowrap}
.match-vs{color:var(--g400);font-size:.73rem;flex-shrink:0}
.match-result{font-size:.76rem;font-weight:800;white-space:nowrap}
.match-arena-lbl{font-size:.68rem;color:var(--g500);white-space:nowrap;flex-shrink:0}
.win{color:var(--green)} .lose{color:var(--red)} .draw-c{color:#ca8a04}

/* ── GROUP COLORS ────────────────────────────────────── */
.gl-A{color:#1d4ed8}.gl-B{color:#dc2626}.gl-C{color:#16a34a}.gl-D{color:#9333ea}
.gl-E{color:#ea580c}.gl-F{color:#0891b2}.gl-G{color:#ca8a04}.gl-H{color:#db2777}

/* ── BRACKET ─────────────────────────────────────────── */
.bracket-section{margin-top:1.1rem;padding-top:1.1rem;border-top:2px dashed var(--g200)}
.bracket-stage-title{font-size:.88rem;font-weight:800;color:var(--navy);margin-bottom:.65rem;display:flex;align-items:center;gap:.35rem}

/* ── PROGRESS ────────────────────────────────────────── */
.prog-bar{background:var(--g200);border-radius:4px;height:6px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:4px;transition:width .4s}

/* ── SECTION HEADER ──────────────────────────────────── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:.75rem;flex-wrap:wrap}
.sec-title{font-size:1.15rem;font-weight:900;color:var(--navy)}

/* ── VIEWS ───────────────────────────────────────────── */
.view{display:none}
.view.active{display:block}

/* ── GRID HELPERS ────────────────────────────────────── */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
.gauto{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}

/* ── MODALS ──────────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:1rem
}
.overlay.hidden{display:none}
.modal{
  background:#fff;border-radius:var(--rl);width:100%;max-width:460px;
  box-shadow:var(--sh3);overflow:hidden;max-height:90vh;
  display:flex;flex-direction:column
}
.modal.wide{max-width:580px}
.modal-hdr{padding:.85rem 1.1rem;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-hdr h3{font-size:.92rem;font-weight:800}
.modal-close{background:none;color:#fff;font-size:1.25rem;padding:.1rem .35rem;border-radius:4px;line-height:1;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:1.1rem;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.modal-foot{padding:.8rem 1.1rem;border-top:1px solid var(--g200);display:flex;gap:.45rem;justify-content:flex-end;flex-shrink:0}

/* ── FORMS ───────────────────────────────────────────── */
.fg{margin-bottom:.85rem}
.fg:last-child{margin-bottom:0}
.fl{display:block;font-size:.78rem;font-weight:700;color:var(--g800);margin-bottom:.3rem}
.fc{width:100%;padding:.5rem .75rem;border:1.5px solid var(--g400);border-radius:6px;font-size:.9rem;transition:border-color .2s;background:#fff;min-height:44px}
.fc:focus{outline:none;border-color:var(--navy)}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.lf-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem}

/* ── RESULT BUTTONS ──────────────────────────────────── */
.res-btns{display:flex;gap:.45rem}
.res-btn{flex:1;padding:.65rem .3rem;border-radius:8px;font-size:.78rem;font-weight:800;border:2px solid var(--g300);background:#fff;color:var(--g600);transition:all .15s;min-height:52px}
.res-btn.sel-a{border-color:var(--navy);background:var(--navy);color:#fff}
.res-btn.sel-d{border-color:var(--gold);background:var(--gold);color:#1a2a00}
.res-btn.sel-b{border-color:var(--red);background:var(--red);color:#fff}
.match-preview{background:var(--g100);border-radius:8px;padding:.65rem;text-align:center;font-size:.9rem;font-weight:700;margin-bottom:.7rem;display:flex;align-items:center;justify-content:center;gap:.45rem;flex-wrap:wrap}
.match-preview .versus{color:var(--g400);font-size:.78rem;font-weight:400}

/* ── FINAL PODIUM ─────────────────────────────────────── */
.podium-wrap{margin-top:1.4rem;padding-top:1.2rem;border-top:2px dashed var(--g200)}
.podium-title{font-size:.95rem;font-weight:900;color:var(--navy);margin-bottom:1rem;display:flex;align-items:center;gap:.4rem}
.podium-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem}
.podium-card{border-radius:var(--rl);padding:1rem .75rem;text-align:center;box-shadow:var(--sh1)}
.podium-card.p1{border:2.5px solid #f4c430;background:linear-gradient(135deg,#fffde7,#fff8c0)}
.podium-card.p2{border:2.5px solid #b0bec5;background:linear-gradient(135deg,#f5f5f5,#eceff1)}
.podium-card.p3{border:2.5px solid #a5805a;background:linear-gradient(135deg,#fff3e0,#ffe0b2)}
.podium-card.p4{border:2px solid var(--g300);background:#fff}
.podium-medal{font-size:2rem;line-height:1;margin-bottom:.35rem}
.podium-rank{font-size:.65rem;font-weight:800;color:var(--g600);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem}
.podium-name{font-size:.9rem;font-weight:900;color:var(--text);word-break:keep-all;line-height:1.35}
.podium-card.p1 .podium-name{color:#7a5c00}
.podium-card.p2 .podium-name{color:#455a64}
.podium-card.p3 .podium-name{color:#6d4c41}
@media(max-width:640px){.podium-grid{grid-template-columns:repeat(2,1fr);gap:.55rem}}

/* ── MISC ────────────────────────────────────────────── */
.editable{cursor:pointer;border-bottom:1px dashed var(--g400)}
.editable:hover{color:var(--navy)}
.mt1{margin-top:.5rem}.mt2{margin-top:1rem}
.mb1{margin-bottom:.5rem}.mb2{margin-bottom:1rem}
.flex{display:flex}.ai-c{align-items:center}.jc-sb{justify-content:space-between}
.gap1{gap:.5rem}.gap2{gap:1rem}
.fw7{font-weight:700}.fw9{font-weight:900}
.muted{color:var(--g500)}.small{font-size:.75rem}
.info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:7px;padding:.7rem .9rem;font-size:.8rem;color:#1e40af;margin-bottom:.85rem}
.warn-box{background:#fffbeb;border:1px solid #fde68a;border-radius:7px;padding:.7rem .9rem;font-size:.8rem;color:#92400e;margin-bottom:.85rem}

/* ═══════════════════════════════════════════════════════
   RESPONSIVE BREAKPOINTS
═══════════════════════════════════════════════════════ */

/* Tablet ≤ 900px */
@media(max-width:900px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .gauto{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
}

/* Mobile ≤ 640px: switch to bottom nav, card tables */
@media(max-width:640px){
  body{font-size:14px}

  /* Header compact */
  .hdr{padding:.55rem .85rem .55rem .85rem}
  .hdr-logo{font-size:1.4rem}
  .hdr-txt .title{font-size:.85rem}
  .hdr-txt .sub{display:none}
  .btn-hdr{padding:.3rem .55rem;font-size:.72rem}
  .badge-admin{font-size:.65rem;padding:.15rem .45rem}

  /* Top nav → hidden; bottom nav → visible */
  .top-nav{display:none}
  .bottom-nav{display:block}

  /* Main padding */
  .main{padding:.75rem .75rem}

  /* Stats: 2×2 */
  .stats-row{grid-template-columns:repeat(2,1fr);gap:.6rem;margin-bottom:.85rem}
  .stat-val{font-size:1.6rem}
  .stat-card{padding:.7rem .85rem}

  /* Cards */
  .card-hdr{padding:.7rem .85rem;flex-wrap:wrap;gap:.5rem}
  .card-body{padding:.85rem}
  .card-title{font-size:.88rem}

  /* Grid collapse */
  .g2{grid-template-columns:1fr}
  .gauto{grid-template-columns:1fr}

  /* Tabs: horizontal scroll */
  .tab-bar{gap:.4rem;padding-bottom:.2rem}
  .tab-btn{padding:.35rem .75rem;font-size:.78rem;min-height:40px}

  /* Desktop tables → HIDDEN on mobile for standings/LF */
  .standings-desktop{display:none}
  .standings-mobile{display:block}
  .lf-table-wrap{display:none}
  .lf-cards{display:block}

  /* Match items: bigger touch target */
  .match-item{padding:.6rem .75rem;min-height:48px}
  .match-teams{font-size:.85rem}

  /* Arena grid: 2 cols */
  .arena-grid{grid-template-columns:repeat(2,1fr);gap:.5rem}
  .arena-card{padding:.55rem .4rem}
  .arena-teams{font-size:.75rem}

  /* Modals: bottom sheet */
  .overlay{padding:0;align-items:flex-end}
  .modal,.modal.wide{
    max-width:100%;border-radius:20px 20px 0 0;
    max-height:92vh;
    padding-bottom:var(--safe-b)
  }
  .modal-hdr{border-radius:0}

  /* LF modal: stack vertically */
  .lf-grid{grid-template-columns:1fr}

  /* Buttons */
  .btn{min-height:42px}
  .btn-sm{min-height:36px}
  .modal-foot{padding:.75rem .9rem}
  .modal-foot .btn{flex:1;justify-content:center}

  /* Summary table: hide some columns */
  .sum-hide{display:none}

  /* Section header */
  .sec-title{font-size:1.05rem}
}

/* Very small ≤ 375px */
@media(max-width:375px){

<script>
'use strict';

const ADMIN_PW = 'roborave2026';
const GL = ['A','B','C','D','E','F','G','H'];

/* ══════════════════════════════════════════════════════
   FIREBASE 온라인 동기화 설정
   Firebase 콘솔(https://console.firebase.google.com)에서
   프로젝트 생성 후 아래 값을 채워넣으세요.
   비워두면 기기 내 저장(localStorage)으로만 동작합니다.
══════════════════════════════════════════════════════ */
const FB_CONFIG = {
  apiKey:            "AIzaSyCSMdkb391bJCIxGcr6JZuiDDzSlJlnBWM",
  authDomain:        "roborave-korea.firebaseapp.com",
  databaseURL:       "https://roborave-korea-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "roborave-korea",
  storageBucket:     "roborave-korea.firebasestorage.app",
  messagingSenderId: "589408311648",
  appId:             "1:589408311648:web:a46b75148b19c70476a605",
  measurementId:     "G-1N5ZX7W3DX",
};
const FB_PATH = 'rrk_data';   // Firebase 내 저장 경로 (변경 불필요)

let fbDb = null;
let lastSaveStr = '';   // 자신이 저장한 데이터 해시 (리스너 루프 방지)

let S;
let curView = 'dashboard';
let sumoTab = 'juniorSpike';
let lfTab   = 'junior';
let editMatch = null;
let editLf    = null;
let editName  = null;
let curResult = null;

/* ── DEFAULT STATE ────────────────────────────────── */
function mkDefault() {
  return {
    isAdmin: false,
    sumo: {
      juniorSpike: mkSumo('JS', 48, 8),
      seniorSpike: mkSumo('SS', 12, 2),
      juniorOpen:  mkSumo('JO',  8, 2),
      seniorOpen:  mkSumo('SO',  6, 2),
    },
    lineFollow: {
      junior: mkLf('LFJ', 4),
      senior: mkLf('LFS', 7),
    },
    othello: mkOthello(11)
  };
}

function mkSumo(pfx, total, nGroups) {
  const perGroup = total / nGroups;
  const teams = [];
  for (let i = 0; i < total; i++) {
    teams.push({ id:`${pfx}${String(i+1).padStart(2,'0')}`, name:`팀 ${i+1}`, group:Math.floor(i/perGroup) });
  }
  const matches = [];
  for (let g = 0; g < nGroups; g++) {
    const gt = teams.filter(t => t.group === g);
    for (let i = 0; i < gt.length; i++)
      for (let j = i+1; j < gt.length; j++)
        matches.push({ id:`${pfx}_G${g}_${i}_${j}`, stage:'group', group:g, teamA:gt[i].id, teamB:gt[j].id, result:null, arena:null, status:'pending' });
  }
  return { teams, matches, knockoutMatches:[], koStage: nGroups*2 >= 16 ? 'r16' : 'sf' };
}

function mkLf(pfx, count) {
  return { participants: Array.from({length:count}, (_,i) => ({
    id:`${pfx}${String(i+1).padStart(2,'0')}`, name:`참가자 ${i+1}`,
    round1:{score:null,bonus:null,time:null}, round2:{score:null,bonus:null,time:null}
  }))};
}

function mkOthello(count) {
  const gA = Math.ceil(count/2);
  const participants = Array.from({length:count}, (_,i) => ({
    id:`OT${String(i+1).padStart(2,'0')}`, name:`참가자 ${i+1}`, group: i < gA ? 0 : 1
  }));
  const matches = [];
  for (let g = 0; g < 2; g++) {
    const gp = participants.filter(p => p.group === g);
    for (let i = 0; i < gp.length; i++)
      for (let j = i+1; j < gp.length; j++)
        matches.push({ id:`OT_G${g}_${i}_${j}`, stage:'group', group:g, teamA:gp[i].id, teamB:gp[j].id, result:null, arena:'1', status:'pending' });
  }
  return { participants, matches, knockoutMatches:[] };
}

/* ── PERSISTENCE ──────────────────────────────────── */

// localStorage 전용 저장 (Firebase 루프 방지용)
function saveLocal() {
  try { localStorage.setItem('rrk_state', JSON.stringify(S)); } catch(e) {}
}

// Firebase + localStorage 동시 저장 (관리자가 결과 입력할 때만 호출)
function save() {
  saveLocal();
  if (!fbDb) return;
  const payload = JSON.parse(JSON.stringify(S));
  delete payload.isAdmin;
  lastSaveStr = JSON.stringify(payload);
  fbDb.ref(FB_PATH).set(payload).catch(err => {
    console.error('Firebase 저장 오류:', err.message);
    setSyncBadge('error');
    alert('⚠️ Firebase 저장 실패\n\n' + err.message +
      '\n\nFirebase 콘솔 → Realtime Database → 규칙 탭에서\n".read":true, ".write":true 로 설정하고 게시해 주세요.');
  });
}

// Firebase에 로컬 데이터 강제 업로드 (관리자 전용)
function pushToFirebase() {
  if (!fbDb) { alert('Firebase가 연결되어 있지 않습니다.'); return; }
  const payload = JSON.parse(JSON.stringify(S));
  delete payload.isAdmin;
  lastSaveStr = JSON.stringify(payload);
  fbDb.ref(FB_PATH).set(payload)
    .then(() => alert('✅ Firebase 업로드 완료! 다른 기기에서 새로고침하면 반영됩니다.'))
    .catch(err => alert('❌ 업로드 실패: ' + err.message));
}

function load() {
  try {
    const r = localStorage.getItem('rrk_state');
    if (r) { S = JSON.parse(r); migrateLocal(); return; }
  } catch(e) {}
  S = mkDefault();
}

/* ── FIREBASE 초기화 ───────────────────────────────── */
function initFirebase() {
  if (!FB_CONFIG.databaseURL || !FB_CONFIG.apiKey) return;
  try {
    firebase.initializeApp(FB_CONFIG);
    fbDb = firebase.database();

    // 실제 연결 상태 감지
    fbDb.ref('.info/connected').on('value', snap => {
      setSyncBadge(snap.val() ? 'online' : 'offline');
    });

    // 실시간 데이터 리스너
    fbDb.ref(FB_PATH).on('value', snap => {
      const d = snap.val();

      if (!d) {
        // Firebase에 데이터 없음 → 로컬 데이터 업로드
        const payload = JSON.parse(JSON.stringify(S));
        delete payload.isAdmin;
        lastSaveStr = JSON.stringify(payload);
        fbDb.ref(FB_PATH).set(payload).catch(err => {
          console.warn('초기 업로드 실패:', err.message);
        });
        updateAdminUI(); // ← 버튼 표시 갱신
        return;
      }

      // 내가 방금 저장한 데이터면 재렌더 스킵
      if (JSON.stringify(d) === lastSaveStr) return;

      // 다른 기기에서 온 데이터 → Firebase null 복원 후 화면 업데이트
      const wasAdmin = S?.isAdmin || false;
      S = restoreNulls(d);  // Firebase가 제거한 null 값 복원
      S.isAdmin = wasAdmin;
      migrateLocal();
      updateAdminUI();
      renderAll();

    }, err => {
      console.error('Firebase 읽기 오류:', err.message);
      setSyncBadge('error');
    });

  } catch(e) {
    console.warn('Firebase 초기화 실패:', e);
    setSyncBadge('error');
  }
}

function setSyncBadge(state) {
  const el = document.getElementById('syncBadge');
  if (!el || !fbDb) { if(el) el.style.display='none'; return; }
  el.style.display = 'inline-flex';
  if (state === 'online') {
    el.textContent = '🟢 온라인';
    el.style.background = 'rgba(6,200,126,.25)';
    el.style.color = '#fff';
  } else {
    el.textContent = '🔴 오프라인';
    el.style.background = 'rgba(230,57,70,.3)';
    el.style.color = '#fff';
  }
}

/* ── FIREBASE NULL 복원 ────────────────────────────── */
// Firebase는 null 값을 자동으로 제거함 → 받은 후 복원 필수
function restoreNulls(d) {
  if (!d) return d;
  const n = v => (v === undefined ? null : v);

  // LineFollow participants: round1/round2 복원
  if (d.lineFollow) {
    Object.values(d.lineFollow).forEach(cat => {
      (cat.participants || []).forEach(p => {
        p.round1 = p.round1 || {};
        p.round1.score = n(p.round1.score);
        p.round1.bonus = n(p.round1.bonus);
        p.round1.time  = n(p.round1.time);
        p.round2 = p.round2 || {};
        p.round2.score = n(p.round2.score);
        p.round2.bonus = n(p.round2.bonus);
        p.round2.time  = n(p.round2.time);
      });
    });
  }

  // Sumo / Othello match 필드 복원
  const normM = ms => (ms || []).forEach(m => {
    m.result = n(m.result);
    m.arena  = n(m.arena);
    m.teamA  = n(m.teamA);
    m.teamB  = n(m.teamB);
  });
  if (d.sumo) Object.values(d.sumo).forEach(cat => {
    normM(cat.matches); normM(cat.knockoutMatches);
  });
  if (d.othello) { normM(d.othello.matches); normM(d.othello.knockoutMatches); }

  return d;
}

/* ── 데이터 마이그레이션 ────────────────────────────── */
// saveLocal만 호출 (Firebase에 다시 쓰지 않음 → 루프 방지)
function migrateLocal() {
  _migrate();
  saveLocal();
}
// save()까지 호출 (로컬에서 최초 로드 시)
function migrateState() {
  _migrate();
  save();
}
function _migrate() {
  // ① result 있는데 status pending → done 자동 수정
  const fixStatus = ms => { if(!ms)return; ms.forEach(m=>{ if(m.result&&m.status==='pending')m.status='done'; }); };
  Object.values(S.sumo).forEach(cat => { fixStatus(cat.matches); fixStatus(cat.knockoutMatches); });
  fixStatus(S.othello.matches); fixStatus(S.othello.knockoutMatches);

  // ② 3위 결정전 슬롯 자동 추가
  const addThird = (ko, pfx, arena) => {
    if (!ko||!ko.length||ko.some(m=>m.stage==='3rd')||!ko.some(m=>m.stage==='sf')) return;
    const idx = ko.findIndex(m=>m.stage==='final');
    const slot = {id:`${pfx}_3rd_0`,stage:'3rd',teamA:null,teamB:null,result:null,arena,status:'pending'};
    if(idx>=0) ko.splice(idx,0,slot); else ko.push(slot);
  };
  Object.entries(S.sumo).forEach(([k,cat])=>addThird(cat.knockoutMatches,k,null));
  addThird(S.othello.knockoutMatches,'OT','1');

  // ③ 승자 전파
  Object.entries(S.sumo).forEach(([k,cat])=>{ if((cat.knockoutMatches||[]).length) propagateKOWinners('sumo',k); });
  if((S.othello.knockoutMatches||[]).length) propagateKOWinners('othello','');
}

/* ── CALCULATIONS ─────────────────────────────────── */
function getStandings(teams, matches) {
  const st = {};
  teams.forEach(t => { st[t.id] = {id:t.id, name:t.name, W:0, D:0, L:0, pts:0, played:0}; });
  matches.forEach(m => {
    if (m.status !== 'done' || !m.result) return;
    st[m.teamA].played++; st[m.teamB].played++;
    if      (m.result === 'A') { st[m.teamA].W++; st[m.teamA].pts += 3; st[m.teamB].L++; }
    else if (m.result === 'B') { st[m.teamB].W++; st[m.teamB].pts += 3; st[m.teamA].L++; }
    else                       { st[m.teamA].D++; st[m.teamA].pts++; st[m.teamB].D++; st[m.teamB].pts++; }
  });
  return Object.values(st).sort((a,b) => b.pts - a.pts || b.W - a.W || a.L - b.L);
}

function getLfRanking(participants) {
  return [...participants].map(p => {
    const r1=p.round1, r2=p.round2, has1=r1.score!==null, has2=r2.score!==null;
    let best=null, bestRnd=0;
    if (has1 && has2) {
      const t1=r1.score+r1.bonus, t2=r2.score+r2.bonus;
      if (t1>t2||(t1===t2&&r1.time<=r2.time)){best=r1;bestRnd=1;}else{best=r2;bestRnd=2;}
    } else if (has1){best=r1;bestRnd=1;} else if (has2){best=r2;bestRnd=2;}
    return {...p, best, bestRnd, hasBest:!!best};
  }).sort((a,b) => {
    if (!a.hasBest && !b.hasBest) return 0;
    if (!a.hasBest) return 1; if (!b.hasBest) return -1;
    const at=a.best.score+a.best.bonus, bt=b.best.score+b.best.bonus;
    if (bt!==at) return bt-at;
    return a.best.time - b.best.time;
  });
}

function matchCounts(ms) { return { total:ms.length, done:ms.filter(m=>m.status==='done').length }; }

function globalCounts() {
  let total=0, done=0;
  [...Object.values(S.sumo), S.othello].forEach(cat => {
    const g=matchCounts(cat.matches), k=matchCounts(cat.knockoutMatches||[]);
    total += g.total+k.total; done += g.done+k.done;
  });
  return {total, done, rem:total-done};
}

function stageLabel(cat) {
  const allDone = cat.matches.every(m => m.status==='done');
  if (!allDone) {
    const d = cat.matches.filter(m=>m.status==='done').length;
    return d===0 ? '대기중' : `조별리그 (${d}/${cat.matches.length})`;
  }
  const ko = cat.knockoutMatches||[];
  if (!ko.length) return '조별 완료 · 토너먼트 대기';
  const kd = ko.filter(m=>m.status==='done').length;
  return ko.every(m=>m.status==='done') ? '✅ 완료' : `토너먼트 (${kd}/${ko.length})`;
}

function lfStageLabel(cat) {
  const all=cat.participants, n=all.length;
  const e1=all.filter(p=>p.round1.score!==null).length;
  const e2=all.filter(p=>p.round2.score!==null).length;
  if (!e1&&!e2) return '대기중';
  if (e1===n&&e2===n) return '✅ 완료';
  return `진행중 (1차:${e1}/${n} 2차:${e2}/${n})`;
}

function getArenaStatus() {
  const status = {};
  const proc = (matches, category, teams) => {
    matches.forEach(m => {
      if (!m.arena) return;
      const a = String(m.arena);
      if (m.status==='ongoing' || (m.status==='done' && !status[a])) {
        const tA=teams.find(t=>t.id===m.teamA), tB=teams.find(t=>t.id===m.teamB);
        if (!status[a] || m.status==='ongoing')
          status[a] = {teamA:tA?.name||m.teamA, teamB:tB?.name||m.teamB, cat:category, done:m.status==='done', ongoing:m.status==='ongoing'};
      }
    });
  };
  const sn = {juniorSpike:'Junior Spike', seniorSpike:'Senior Spike', juniorOpen:'Junior Open', seniorOpen:'Senior Open'};
  Object.entries(S.sumo).forEach(([k,cat]) => {
    proc(cat.matches, `SUMO·${sn[k]}`, cat.teams);
    proc(cat.knockoutMatches||[], `SUMO·${sn[k]}`, cat.teams);
  });
  proc(S.othello.matches,'OTHELLO',S.othello.participants);
  proc(S.othello.knockoutMatches||[],'OTHELLO',S.othello.participants);
  return status;
}

  const arena=m.arena?`<span class="match-arena-lbl">📍${m.arena}</span>`:'';

}

function renderKOSection(cat, catKey, teams, section) {
  const byStage = {};
  (cat.knockoutMatches||[]).forEach(m => { if(!byStage[m.stage])byStage[m.stage]=[]; byStage[m.stage].push(m); });
  const order=['r16','qf','sf','3rd','final'], names={r16:'⚡ 16강',qf:'🔥 8강',sf:'🏅 4강','3rd':'🥉 3위 결정전',final:'🏆 결승'};
  let html=`<div class="card mb2"><div class="card-hdr"><div class="card-title">🏆 토너먼트</div></div><div class="card-body">`;
  order.forEach(stage => {
    if (!byStage[stage]) return;
    html+=`<div class="bracket-section"><div class="bracket-stage-title">${names[stage]}</div><div class="match-list">${byStage[stage].map(m=>renderMatchItem(m,teams,section,catKey,true)).join('')}</div></div>`;
  });
  html += `</div></div>`;

  // 최종 순위표 — 별도 카드로 토너먼트 아래에 표시
  const finalM = (byStage['final']||[])[0];
  const thirdM = (byStage['3rd']||[])[0];
  const resolved = m => m && m.result && m.result !== 'D';
  if (resolved(finalM) && resolved(thirdM)) {
    const getName = id => teams.find(t=>t.id===id)?.name || id || 'TBD';
    const w  = m => getName(m.result==='A' ? m.teamA : m.teamB);
    const lo = m => getName(m.result==='A' ? m.teamB : m.teamA);
    const p = [
      {cls:'p1', medal:'🥇', rank:'1위 우승',  name: w(finalM)},
      {cls:'p2', medal:'🥈', rank:'2위 준우승', name: lo(finalM)},
      {cls:'p3', medal:'🥉', rank:'3위',        name: w(thirdM)},
      {cls:'p4', medal:'4️⃣', rank:'4위',        name: lo(thirdM)},
    ];
    html += `<div class="card">
      <div class="card-hdr"><div class="card-title">🏅 최종 순위</div></div>
      <div class="card-body">
        <div class="podium-grid">
          ${p.map(r=>`<div class="podium-card ${r.cls}">
            <div class="podium-medal">${r.medal}</div>
            <div class="podium-rank">${r.rank}</div>
            <div class="podium-name">${r.name}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  }

  return html;
}

/* ── KNOCKOUT WINNER PROPAGATION ─────────────────── */
function propagateKOWinners(section, catKey) {
  let ko, pfx;
  if (section === 'sumo') { ko = S.sumo[catKey].knockoutMatches; pfx = catKey; }
  else                    { ko = S.othello.knockoutMatches;       pfx = 'OT';   }

  const find = id => ko.find(m => m.id === id);
  // 결과가 확정되면(status=done OR result 입력) 다음 라운드로 전파
  const resolved = m => m && m.result && m.result !== 'D';
  const winner = m => {
    if (!resolved(m)) return null;
    return m.result === 'A' ? m.teamA : m.teamB;
  };
  const loser = m => {
    if (!resolved(m)) return null;
    return m.result === 'A' ? m.teamB : m.teamA;
  };

  // 16강 → 8강
  for (let i = 0; i < 4; i++) {
    const qf = find(`${pfx}_qf_${i}`); if (!qf) continue;
    const w0 = winner(find(`${pfx}_r16_${i*2}`));
    const w1 = winner(find(`${pfx}_r16_${i*2+1}`));
    if (w0 !== null) qf.teamA = w0;
    if (w1 !== null) qf.teamB = w1;
    if (w0 !== null || w1 !== null) qf.status = 'pending';
  }

  // 8강 → 4강
  for (let i = 0; i < 2; i++) {
    const sf = find(`${pfx}_sf_${i}`); if (!sf) continue;
    const w0 = winner(find(`${pfx}_qf_${i*2}`));
    const w1 = winner(find(`${pfx}_qf_${i*2+1}`));
    if (w0 !== null) sf.teamA = w0;
    if (w1 !== null) sf.teamB = w1;
    if (w0 !== null || w1 !== null) sf.status = 'pending';
  }

  // 4강 패자 → 3위 결정전
  const thirdM = find(`${pfx}_3rd_0`);
  if (thirdM) {
    const l0 = loser(find(`${pfx}_sf_0`));
    const l1 = loser(find(`${pfx}_sf_1`));
    if (l0 !== null) thirdM.teamA = l0;
    if (l1 !== null) thirdM.teamB = l1;
    // 이미 결과가 입력된 경기는 상태 유지 (대기로 되돌리지 않음)
    if ((l0 !== null || l1 !== null) && !thirdM.result) thirdM.status = 'pending';
  }

  // 4강 승자 → 결승
  const finalM = find(`${pfx}_final_0`);
  if (finalM) {
    const w0 = winner(find(`${pfx}_sf_0`));
    const w1 = winner(find(`${pfx}_sf_1`));
    if (w0 !== null) finalM.teamA = w0;
    if (w1 !== null) finalM.teamB = w1;
    // 이미 결과가 입력된 경기는 상태 유지
    if ((w0 !== null || w1 !== null) && !finalM.result) finalM.status = 'pending';
  }
}

/* ── KNOCKOUT GENERATION ─────────────────────────── */
function genSumoKO(catKey) {
  const cat=S.sumo[catKey];
  const nGroups=[...new Set(cat.teams.map(t=>t.group))].length;
  const adv=[];
  for(let g=0;g<nGroups;g++){
    const gt=cat.teams.filter(t=>t.group===g), gm=cat.matches.filter(m=>m.group===g);
    const st=getStandings(gt,gm); adv.push(st[0]?.id||null, st[1]?.id||null);
  }
  const ms=[], pfx=catKey;
  if(cat.koStage==='r16'){
    for(let i=0;i<8;i++) ms.push({id:`${pfx}_r16_${i}`,stage:'r16',teamA:adv[i*2]||null,teamB:adv[i*2+1]||null,result:null,arena:null,status:'pending'});
    for(let i=0;i<4;i++) ms.push({id:`${pfx}_qf_${i}`,stage:'qf',teamA:null,teamB:null,result:null,arena:null,status:'pending'});
    for(let i=0;i<2;i++) ms.push({id:`${pfx}_sf_${i}`,stage:'sf',teamA:null,teamB:null,result:null,arena:null,status:'pending'});
  } else {
    ms.push({id:`${pfx}_sf_0`,stage:'sf',teamA:adv[0]||null,teamB:adv[3]||null,result:null,arena:null,status:'pending'});
    ms.push({id:`${pfx}_sf_1`,stage:'sf',teamA:adv[1]||null,teamB:adv[2]||null,result:null,arena:null,status:'pending'});
  }
  ms.push({id:`${pfx}_3rd_0`,stage:'3rd',teamA:null,teamB:null,result:null,arena:null,status:'pending'});
  ms.push({id:`${pfx}_final_0`,stage:'final',teamA:null,teamB:null,result:null,arena:null,status:'pending'});
  cat.knockoutMatches=ms; save(); renderSumo();
}

function genOthelloKO() {
  const cat=S.othello, adv=[];
  for(let g=0;g<2;g++){
    const gp=cat.participants.filter(p=>p.group===g), gm=cat.matches.filter(m=>m.group===g);
    const st=getStandings(gp,gm); adv.push(st[0]?.id||null, st[1]?.id||null);
  }
  cat.knockoutMatches=[
    {id:'OT_sf_0',stage:'sf',teamA:adv[0]||null,teamB:adv[3]||null,result:null,arena:'1',status:'pending'},
    {id:'OT_sf_1',stage:'sf',teamA:adv[1]||null,teamB:adv[2]||null,result:null,arena:'1',status:'pending'},
    {id:'OT_3rd_0',stage:'3rd',teamA:null,teamB:null,result:null,arena:'1',status:'pending'},
    {id:'OT_final_0',stage:'final',teamA:null,teamB:null,result:null,arena:'1',status:'pending'},
  ];
  save(); renderOthello();
}

/* ── RENDER: LINE FOLLOW ──────────────────────────── */
function renderLineFollow() {
  const cat = S.lineFollow[lfTab];
  const ranking = getLfRanking(cat.participants);
  const f = v => v!==null ? v : '-';
  const ft = v => v!==null ? v+'초' : '-';

  // Desktop full table
  let tableHtml = `<div class="tbl-wrap lf-table-wrap"><table>
    <thead><tr>
      <th>순위</th><th>참가자</th>
      <th>1차 점수</th><th>1차 보너스</th><th>1차 시간</th>
      <th>2차 점수</th><th>2차 보너스</th><th>2차 시간</th>
      <th style="background:#fff9e6">최고합계</th>
      <th style="background:#fff9e6">최고시간</th>
      <th style="background:#fff9e6">채택</th>
      ${S.isAdmin?'<th>입력</th>':''}
    </tr></thead>
    <tbody>`;

  ranking.forEach((p,idx) => {
    const rc=idx===0?'tr-1st':idx===1?'tr-2nd':idx===2?'tr-3rd':'';
    const ri=idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':'';
    const nm=S.isAdmin?`<span class="editable" onclick="openName('lf','${lfTab}','${p.id}')">${p.name}</span>`:p.name;
    const r1=p.round1, r2=p.round2, best=p.hasBest?p.best:null;
    tableHtml += `<tr class="${rc}">
      <td class="fw7">${ri}${idx+1}</td><td class="fw7">${nm}</td>
      <td>${f(r1.score)}</td><td>${f(r1.bonus)}</td><td>${ft(r1.time)}</td>
      <td>${f(r2.score)}</td><td>${f(r2.bonus)}</td><td>${ft(r2.time)}</td>
      <td style="background:#fff9e6" class="fw7">${best?best.score+best.bonus:'-'}</td>
      <td style="background:#fff9e6" class="fw7">${best?best.time+'초':'-'}</td>
      <td style="background:#fff9e6">${p.hasBest?`<span class="badge ${p.bestRnd===1?'badge-done':'badge-ongoing'}">${p.bestRnd}차</span>`:'-'}</td>
      ${S.isAdmin?`<td><button class="btn btn-primary btn-xs" onclick="openLf('${lfTab}','${p.id}')">입력</button></td>`:''}
    </tr>`;
  });
  tableHtml += `</tbody></table></div>`;

  // Mobile cards
  let cardsHtml = `<div class="lf-cards">`;
  ranking.forEach((p, idx) => {
    const cls=idx===0?'lfc-1st':idx===1?'lfc-2nd':idx===2?'lfc-3rd':'';
    const ri=idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':`#${idx+1}`;
    const r1=p.round1, r2=p.round2, best=p.hasBest?p.best:null;
    const nm=S.isAdmin?`<span class="editable" onclick="openName('lf','${lfTab}','${p.id}')">${p.name}</span>`:p.name;
    cardsHtml += `<div class="lf-card ${cls}">
      <div class="lf-card-top">
        <div>
          <div class="lf-card-rank">${ri}</div>
          <div class="lf-card-name">${nm}</div>
        </div>
        ${S.isAdmin?`<button class="btn btn-primary btn-sm" onclick="openLf('${lfTab}','${p.id}')">기록 입력</button>`:''}
      </div>
      <dl class="lf-card-grid">
        <dt>1차 점수</dt><dd>${f(r1.score)}</dd>
        <dt>1차 보너스</dt><dd>${f(r1.bonus)}</dd>
        <dt>1차 시간</dt><dd>${ft(r1.time)}</dd>
        <dt>2차 점수</dt><dd>${f(r2.score)}</dd>
        <dt>2차 보너스</dt><dd>${f(r2.bonus)}</dd>
        <dt>2차 시간</dt><dd>${ft(r2.time)}</dd>
        <dt style="color:var(--navy)">최고 합계</dt><dd class="win fw7">${best?best.score+best.bonus+'점':'-'}</dd>
        <dt style="color:var(--navy)">최고 시간</dt><dd class="win fw7">${best?best.time+'초':'-'}</dd>
      </dl>
      ${p.hasBest?`<div class="mt1"><span class="badge ${p.bestRnd===1?'badge-done':'badge-ongoing'}">${p.bestRnd}차 채택</span></div>`:''}
    </div>`;
  });
  cardsHtml += `</div>`;

  document.getElementById('lfContent').innerHTML = `
    <div class="card">
      <div class="card-hdr">
        <div class="card-title">📊 기록 및 순위</div>
        ${S.isAdmin?`<span class="small muted">이름 클릭=수정</span>`:''}
      </div>
      ${tableHtml}${cardsHtml}
    </div>
    <div class="info-box mt2">
      <strong>순위 기준:</strong> 1·2차 중 좋은 기록 채택 → ① 점수+보너스 높은 순 ② 시간 짧은 순
    </div>`;
}

/* ── RENDER: OTHELLO ──────────────────────────────── */
function renderOthello() {
  const cat = S.othello;
  let html = `<div class="g2 mb2">`;

  for (let g = 0; g < 2; g++) {
    const gp=cat.participants.filter(p=>p.group===g), gm=cat.matches.filter(m=>m.group===g);
    const standings=getStandings(gp,gm), done=gm.filter(m=>m.status==='done').length;

    const desktopTable = `
      <div class="tbl-wrap standings-desktop"><table>
        <thead><tr><th>순위</th><th>참가자${S.isAdmin?' <span class="small muted">(클릭=수정)</span>':''}</th><th>경기</th><th class="win">승</th><th class="draw-c">무</th><th class="lose">패</th><th>승점</th></tr></thead>
        <tbody>${standings.map((s,idx) => {
          const rc=idx===0?'tr-1st':idx===1?'tr-2nd':'';
          const adv=idx<2?`<span class="badge badge-adv">↑4강</span>`:'';
          const nm=S.isAdmin?`<span class="editable" onclick="openName('othello','','${s.id}')">${s.name}</span>`:s.name;
          return `<tr class="${rc}"><td class="fw7">${idx+1}</td><td>${nm} ${adv}</td><td>${s.played}</td><td class="win fw7">${s.W}</td><td class="draw-c">${s.D}</td><td class="lose">${s.L}</td><td class="fw7">${s.pts}</td></tr>`;
        }).join('')}</tbody>
      </table></div>`;

    const mobileCards = `
      <div class="standings-mobile">
        ${standings.map((s,idx) => {
          const cls=idx===0?'sc-1st':idx===1?'sc-2nd':'';
          const rankIco=idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':`${idx+1}`;
          const adv=idx<2?`<span class="badge badge-adv">↑4강</span>`:'';
          const nm=S.isAdmin?`<span class="editable" onclick="openName('othello','','${s.id}')">${s.name}</span>`:s.name;
          return `<div class="scard ${cls}">
            <div class="scard-rank">${rankIco}</div>
            <div class="scard-info">
              <div class="scard-name">${nm} ${adv}</div>
              <div class="scard-stats"><span class="win">승 ${s.W}</span><span class="draw-c">무 ${s.D}</span><span class="lose">패 ${s.L}</span><span class="muted">${s.played}경기</span></div>
            </div>
            <div class="scard-pts">${s.pts}점</div>
          </div>`;
        }).join('')}
      </div>`;

    html += `<div class="card">
      <div class="card-hdr"><div class="card-title"><span class="gl-${GL[g]}">●</span> 그룹 ${GL[g]} <span class="small muted">${gp.length}명·${done}/${gm.length}</span></div></div>
      ${desktopTable}${mobileCards}
    </div>`;
  }
  html += `</div>`;

  if (S.isAdmin) {
    const hasKo=(cat.knockoutMatches||[]).length>0;
    html += hasKo
      ? `<button class="btn btn-ghost btn-sm mb2" onclick="if(confirm('초기화?')){S.othello.knockoutMatches=[];save();renderOthello()}">토너먼트 초기화</button>`
      : `<button class="btn btn-primary mb2 btn-block" onclick="genOthelloKO()">🏆 4강 브래킷 생성</button>`;
  }

  html += `<div class="card mb2">
    <div class="card-hdr"><div class="card-title">📋 조별리그 경기 목록</div></div>
    <div class="card-body">`;
  for (let g=0;g<2;g++) {
    const gm=cat.matches.filter(m=>m.group===g), done=gm.filter(m=>m.status==='done').length;
    html+=`<div class="mb2">
      <div class="flex ai-c gap1 mb1">
        <span class="fw7 small gl-${GL[g]}">그룹 ${GL[g]}</span>
        <span class="muted small">${done}/${gm.length}</span>
      </div>
      <div class="match-list">${gm.map(m=>renderMatchItem(m,cat.participants,'othello','',false)).join('')}</div>
    </div>`;
  }
  html+=`</div></div>`;

  if ((cat.knockoutMatches||[]).length>0) html+=renderKOSection(cat,'',cat.participants,'othello');
  document.getElementById('othelloContent').innerHTML = html;
}

/* ── MATCH MODAL ──────────────────────────────────── */
function openMatch(section, catKey, matchId, ko=false) {
  if (!S.isAdmin) return;
  editMatch = {section, catKey, matchId, ko};
  let match, teams;
  if (section==='sumo') {
    const cat=S.sumo[catKey];
    match=ko?cat.knockoutMatches.find(m=>m.id===matchId):cat.matches.find(m=>m.id===matchId);
    teams=cat.teams;
  } else {
    const cat=S.othello;
    match=ko?cat.knockoutMatches.find(m=>m.id===matchId):cat.matches.find(m=>m.id===matchId);
    teams=cat.participants;
  }
  if (!match) return;
  const tA=teams.find(t=>t.id===match.teamA), tB=teams.find(t=>t.id===match.teamB);
  const nA=tA?.name||match.teamA||'TBD', nB=tB?.name||match.teamB||'TBD';
  document.getElementById('mTeamA').textContent=nA;
  document.getElementById('mTeamB').textContent=nB;
  document.getElementById('rLblA').textContent=nA+' 승리';
  document.getElementById('rLblB').textContent=nB+' 승리';
  const arenaEl=document.getElementById('mArena');
  if (section==='othello') {
    arenaEl.innerHTML='<option value="1">경기장 1</option>'; arenaEl.value='1'; arenaEl.disabled=true;
  } else {
    arenaEl.disabled=false;
    arenaEl.innerHTML='<option value="">선택</option>'+Array.from({length:6},(_,i)=>`<option value="${i+1}">경기장 ${i+1}</option>`).join('');
    arenaEl.value=match.arena||'';
  }
  document.getElementById('mStatus').value=match.status||'pending';
  curResult=match.result||null; updateResButtons();
  document.getElementById('matchOverlay').classList.remove('hidden');
}

function selectResult(r){curResult=r;updateResButtons();if(r)document.getElementById('mStatus').value='done';}
function updateResButtons(){
  document.getElementById('rBtnA').className='res-btn'+(curResult==='A'?' sel-a':'');
  document.getElementById('rBtnD').className='res-btn'+(curResult==='D'?' sel-d':'');
  document.getElementById('rBtnB').className='res-btn'+(curResult==='B'?' sel-b':'');
}
function resetMatch(){curResult=null;updateResButtons();document.getElementById('mStatus').value='pending';document.getElementById('mArena').value='';}

function saveMatch() {
  if (!editMatch) return;
  const {section,catKey,matchId,ko}=editMatch;
  let match;
  if (section==='sumo'){const cat=S.sumo[catKey];match=ko?cat.knockoutMatches.find(m=>m.id===matchId):cat.matches.find(m=>m.id===matchId);}
  else{const cat=S.othello;match=ko?cat.knockoutMatches.find(m=>m.id===matchId):cat.matches.find(m=>m.id===matchId);}
  if (!match) return;
  match.result=curResult; match.arena=document.getElementById('mArena').value||null; match.status=document.getElementById('mStatus').value;
  // 토너먼트 경기라면 승자를 다음 라운드로 자동 진출
  if (editMatch.ko) propagateKOWinners(editMatch.section, editMatch.catKey);
  save(); closeModal('matchOverlay'); renderCurrent();
}

/* ── LF MODAL ─────────────────────────────────────── */
function openLf(catKey, pid) {
  if (!S.isAdmin) return;
  editLf={catKey,pid};
  const p=S.lineFollow[catKey].participants.find(p=>p.id===pid); if(!p)return;
  document.getElementById('lfPName').textContent=p.name;
  document.getElementById('lf1s').value=p.round1.score??''; document.getElementById('lf1b').value=p.round1.bonus??''; document.getElementById('lf1t').value=p.round1.time??'';
  document.getElementById('lf2s').value=p.round2.score??''; document.getElementById('lf2b').value=p.round2.bonus??''; document.getElementById('lf2t').value=p.round2.time??'';
  document.getElementById('lfOverlay').classList.remove('hidden');
}
function saveLf() {
  if (!editLf) return;
  const {catKey,pid}=editLf;
  const p=S.lineFollow[catKey].participants.find(p=>p.id===pid); if(!p)return;
  const pn=id=>{const v=document.getElementById(id).value;return v===''?null:parseFloat(v);};
  p.round1={score:pn('lf1s'),bonus:pn('lf1b'),time:pn('lf1t')};
  p.round2={score:pn('lf2s'),bonus:pn('lf2b'),time:pn('lf2t')};
  save(); closeModal('lfOverlay'); renderCurrent();
}

/* ── NAME MODAL ───────────────────────────────────── */
function openName(section, catKey, pid) {
  if (!S.isAdmin) return;
  editName={section,catKey,pid};
  let ent;
  if(section==='sumo')ent=S.sumo[catKey].teams.find(t=>t.id===pid);
  else if(section==='lf')ent=S.lineFollow[catKey].participants.find(p=>p.id===pid);
  else ent=S.othello.participants.find(p=>p.id===pid);
  document.getElementById('nameInput').value=ent?.name||'';
  document.getElementById('nameOverlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('nameInput').select(),50);
}
function saveName() {
  if (!editName) return;
  const {section,catKey,pid}=editName, n=document.getElementById('nameInput').value.trim(); if(!n)return;
  let ent;
  if(section==='sumo')ent=S.sumo[catKey].teams.find(t=>t.id===pid);
  else if(section==='lf')ent=S.lineFollow[catKey].participants.find(p=>p.id===pid);
  else ent=S.othello.participants.find(p=>p.id===pid);
  if(ent)ent.name=n; save(); closeModal('nameOverlay'); renderCurrent();
}

/* ── MODAL HELPERS ────────────────────────────────── */
function closeModal(id){document.getElementById(id).classList.add('hidden');}

/* ── ADMIN ────────────────────────────────────────── */
function toggleAdmin() {
  if (S.isAdmin){S.isAdmin=false;save();updateAdminUI();renderCurrent();}
  else{
    document.getElementById('pwInput').value='';
    document.getElementById('loginErr').style.display='none';
    document.getElementById('loginOverlay').classList.remove('hidden');
    setTimeout(()=>document.getElementById('pwInput').focus(),150);
  }
}
function doLogin() {
  if (document.getElementById('pwInput').value===ADMIN_PW){
    S.isAdmin=true;save();closeModal('loginOverlay');updateAdminUI();renderCurrent();
  } else { document.getElementById('loginErr').style.display='block'; }
}
function updateAdminUI() {
  const a=S.isAdmin;
  document.getElementById('adminBadge').style.display=a?'inline-flex':'none';
  document.getElementById('adminBtn').textContent=a?'로그아웃':'관리자 로그인';
  document.getElementById('resetBtn').style.display=a?'inline-block':'none';
  const pb=document.getElementById('pushBtn');
  if(pb) pb.style.display=(a&&fbDb)?'inline-block':'none';
}
function resetAll() {
  if(!confirm('⚠️ 모든 데이터를 초기화합니까?\n되돌릴 수 없습니다!'))return;
  const wasAdmin=S.isAdmin; S=mkDefault(); S.isAdmin=wasAdmin; save(); renderAll();
}

/* ── NAVIGATION ───────────────────────────────────── */
function showView(v) {
  curView=v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');

  // Top nav
  const views=['dashboard','sumo','linefollow','othello'];
  document.querySelectorAll('.nav-btn').forEach((btn,i)=>btn.classList.toggle('active',views[i]===v));
  // Bottom nav
  document.querySelectorAll('.bnav-btn').forEach((btn,i)=>btn.classList.toggle('active',views[i]===v));

  // Scroll to top
  window.scrollTo({top:0, behavior:'smooth'});
  renderCurrent();
}

function setSumoTab(tab) {
  sumoTab=tab;
  document.querySelectorAll('#view-sumo .tab-btn').forEach((btn,i)=>btn.classList.toggle('active',['juniorSpike','seniorSpike','juniorOpen','seniorOpen'][i]===tab));
  renderSumo();
}
function setLfTab(tab) {
  lfTab=tab;
  document.querySelectorAll('#view-linefollow .tab-btn').forEach((btn,i)=>btn.classList.toggle('active',['junior','senior'][i]===tab));
  renderLineFollow();
}

function renderCurrent() {
  if(curView==='dashboard')renderDashboard();
  else if(curView==='sumo')renderSumo();
  else if(curView==='linefollow')renderLineFollow();
  else if(curView==='othello')renderOthello();
}
function renderAll() {
  renderDashboard();
  if(curView==='sumo')renderSumo();
  else if(curView==='linefollow')renderLineFollow();
  else if(curView==='othello')renderOthello();
}

/* ── INIT ─────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  load();
  updateAdminUI();
  renderDashboard();
  initFirebase(); // Firebase 온라인 동기화 시작

  ['loginOverlay','matchOverlay','lfOverlay','nameOverlay'].forEach(id => {
    document.getElementById(id).addEventListener('click', function(e){
      if(e.target===this) closeModal(id);
    });
  });

  setInterval(() => {
    const el=document.getElementById('updatedAt');
    if(el&&curView==='dashboard') el.textContent='업데이트: '+new Date().toLocaleTimeString('ko-KR');
  }, 60000);
});
</script>
